function prepareForEmailCopy(node, sourceTable){
  // Šířka podle délky textu (ne podle vykresleného rozměru na obrazovce) — díky tomu jde appka
  // na obrazovce zvětšit/zmenšit, aniž by se cokoliv změnilo na tom, co se zkopíruje do e-mailu.
  // Outlook (vykresluje přes Word) běžně ignoruje CSS white-space:nowrap na buňkách tabulky —
  // <nobr> kolem obsahu je spolehlivější trik napříč e-mailovými klienty.
  let widths = [];
  if(sourceTable){
    const rows = Array.from(sourceTable.rows);
    const refRow = rows.reduce((best,r)=> r.cells.length>best.cells.length ? r : best, rows[0] || {cells:[]});
    Array.from(refRow.cells || []).forEach((cell,idx)=>{
      const len = (cell.textContent||'').trim().length;
      widths[idx] = idx===0 ? Math.max(160, len*14 + 40) : Math.max(50, len*10 + 30);
    });
  }
  node.style.border = '1px solid #9aa7b0';
  node.style.borderCollapse = 'collapse';
  // Pokud tabulka sama deklaruje pevnou šířku (Report tabulky), nenech ji "napnout" na 100 % šířky e-mailu
  if(node.style.width) node.style.maxWidth = node.style.width;
  node.querySelectorAll('tr').forEach(row=>{
    Array.from(row.children).forEach((cell,idx)=>{
      cell.style.whiteSpace = 'nowrap';
      cell.style.border = '1px solid #9aa7b0';
      cell.style.height = '36px';
      cell.style.boxSizing = 'border-box';
      cell.style.fontSize = '12px';
      if(!cell.hasAttribute('colspan') && widths[idx]) cell.style.width = widths[idx]+'px';
      if(!cell.querySelector('nobr')){
        const nobr = document.createElement('nobr');
        while(cell.firstChild) nobr.appendChild(cell.firstChild);
        cell.appendChild(nobr);
      }
    });
  });
  return node;
}
function copyAllTables(tableIds){
  const wrapper = document.createElement('div');
  wrapper.style.position='fixed'; wrapper.style.left='-9999px'; wrapper.style.top='0';
  tableIds.forEach((id,i)=>{
    const t = document.getElementById(id);
    if(!t) return;
    wrapper.appendChild(prepareForEmailCopy(t.cloneNode(true), t));
    if(i<tableIds.length-1) wrapper.appendChild(document.createElement('br'));
  });
  document.body.appendChild(wrapper);
  const range = document.createRange();
  const sel = window.getSelection();
  sel.removeAllRanges();
  range.selectNode(wrapper);
  sel.addRange(range);
  try{
    document.execCommand('copy');
    toast('Všechny tabulky zkopírovány — vlož je (Ctrl+V) do e-mailu');
  }catch(e){
    try{
      const html = wrapper.innerHTML;
      const text = wrapper.innerText;
      const item = new ClipboardItem({
        'text/html': new Blob([html], {type:'text/html'}),
        'text/plain': new Blob([text], {type:'text/plain'})
      });
      navigator.clipboard.write([item]).then(()=>toast('Všechny tabulky zkopírovány — vlož je (Ctrl+V) do e-mailu'));
    }catch(err){ toast('Kopírování se nepodařilo, zkus tabulky kopírovat jednotlivě'); }
  }
  sel.removeAllRanges();
  document.body.removeChild(wrapper);
}
function copyTable(tableId){
  const orig = document.getElementById(tableId);
  if(!orig) return;
  const wrapper = document.createElement('div');
  wrapper.style.position='fixed'; wrapper.style.left='-9999px'; wrapper.style.top='0';
  const table = prepareForEmailCopy(orig.cloneNode(true), orig);
  wrapper.appendChild(table);
  document.body.appendChild(wrapper);
  const range = document.createRange();
  const sel = window.getSelection();
  sel.removeAllRanges();
  range.selectNode(table);
  sel.addRange(range);
  try{
    document.execCommand('copy');
    toast('Tabulka zkopírována — vlož ji (Ctrl+V) do e-mailu');
  }catch(e){
    // fallback: Clipboard API
    try{
      const html = table.outerHTML;
      const text = table.innerText;
      const item = new ClipboardItem({
        'text/html': new Blob([html], {type:'text/html'}),
        'text/plain': new Blob([text], {type:'text/plain'})
      });
      navigator.clipboard.write([item]).then(()=>toast('Tabulka zkopírována — vlož ji (Ctrl+V) do e-mailu'));
    }catch(err){ toast('Kopírování se nepodařilo, zkus označit tabulku ručně'); }
  }
  sel.removeAllRanges();
  document.body.removeChild(wrapper);
}
function exportXlsx(tableId, filename){
  const table = document.getElementById(tableId);
  if(!table || typeof XLSX==='undefined'){ toast('Export se nepodařilo načíst, zkus to znovu'); return; }
  const wb = XLSX.utils.table_to_book(table, {sheet:'Plán'});
  XLSX.writeFile(wb, (filename||'plan')+'_'+state.year+'.xlsx');
}
