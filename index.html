<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Plánovač — Fáze 2 (plány, rozložení, skutečnost)</title>
<style>
  :root{ --cyan:#0099CC; --dark:#003366; --border:#dfe3e8; --bg:#f4f6f8; --green:#82B800; --orange:#FF6000; }
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#1a1a1a;margin:0;padding:0;}
  header{background:var(--dark);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  header h1{font-size:17px;margin:0;}
  .tabs{display:flex;gap:2px;background:#fff;border-bottom:2px solid var(--border);padding:0 24px;overflow-x:auto;}
  .tab{padding:11px 14px;cursor:pointer;font-weight:700;color:#556;border-bottom:3px solid transparent;white-space:nowrap;font-size:13px;}
  .tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
  main{max-width:1100px;margin:0 auto;padding:24px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:18px;}
  .card h2{font-size:15px;color:var(--dark);margin:0 0 12px;text-transform:uppercase;letter-spacing:.3px;}
  input,select{padding:8px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;}
  input[type=number]{width:90px;text-align:right;}
  label{font-size:12px;font-weight:700;color:var(--dark);display:block;margin-bottom:4px;}
  button{background:var(--cyan);color:#fff;border:none;border-radius:5px;padding:9px 16px;cursor:pointer;font-weight:700;font-size:13px;}
  button.secondary{background:#fff;color:var(--dark);border:1px solid var(--border);}
  table{border-collapse:collapse;width:100%;font-size:12.5px;}
  th{background:var(--dark);color:#fff;padding:7px;text-align:center;}
  th:first-child,td:first-child{text-align:left;}
  td{padding:5px 7px;border-bottom:1px solid var(--border);text-align:center;}
  tr:nth-child(even) td{background:#f8fafb;}
  .badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;background:#e6f4d9;color:#5a7a00;}
  .small{font-size:12px;color:#667788;}
  .err{color:#c0392b;font-size:13px;margin-bottom:10px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .hidden{display:none;}
  .readonly-note{background:#fff4e8;border:1px solid #ffd8a8;border-radius:6px;padding:8px 12px;font-size:12.5px;margin-bottom:12px;}
</style>
</head>
<body>
<header>
  <h1>📊 Plánovač — Fáze 2</h1>
  <div id="whoami" class="small"></div>
</header>

<div id="setupCard" class="card" style="margin:24px;">
  <h2>Připojení k Supabase</h2>
  <div class="row">
    <div><label>Supabase URL</label><input id="sbUrl" style="width:320px;" placeholder="https://xxxx.supabase.co"></div>
    <div><label>Anon public key</label><input id="sbKey" style="width:320px;" placeholder="eyJhbGciOi..."></div>
  </div>
  <button onclick="connectSupabase()">Připojit</button>
  <p id="setupErr" class="err"></p>
</div>

<div id="loginCard" class="card hidden" style="margin:24px;">
  <h2>Přihlášení</h2>
  <div class="row">
    <div><label>E-mail</label><input id="loginEmail" type="email"></div>
    <div><label>Heslo</label><input id="loginPass" type="password"></div>
  </div>
  <button onclick="doLogin()">Přihlásit se</button>
  <p id="loginErr" class="err"></p>
</div>

<div id="appShell" class="hidden">
  <div class="tabs" id="tabs"></div>
  <main id="main"></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ============== KONSTANTY (stejné jako v hlavní appce) ============== */
const METRICS = [
  {id:'zivot',  name:'Náš život',               unit:'Kč'},
  {id:'domov',  name:'Náš domov',               unit:'Kč'},
  {id:'auto',   name:'Naše auto',               unit:'Kč'},
  {id:'podnik', name:'Pojištění podnik. rizik', unit:'Kč'},
  {id:'ucty',   name:'Bankovní účty',           unit:'ks'},
  {id:'xsell',  name:'X-SELL',                  unit:'ks'},
];
const MONTHS = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const EVEN_METRICS = ['ucty','xsell'];
const YEAR = new Date().getFullYear();

let sb = null, myProfile = null, myUser = null;
let activeTab = 'poradci';
let cache = { advisors: [], plans: [], dist: Array(12).fill(0), actuals: [] };

const TABS = [
  {id:'poradci', label:'Poradci'},
  {id:'uzivatele', label:'Uživatelé'},
  {id:'plany', label:'Roční plány'},
  {id:'rozlozeni', label:'Rozložení %'},
  {id:'skutecnost', label:'Skutečnost'},
  {id:'import', label:'⬆ Import zálohy'},
];

/* ============== PŘIPOJENÍ / PŘIHLÁŠENÍ ============== */
function connectSupabase(){
  const url = document.getElementById('sbUrl').value.trim();
  const key = document.getElementById('sbKey').value.trim();
  const errEl = document.getElementById('setupErr');
  errEl.textContent = '';
  if(!url || !key){ errEl.textContent = 'Vyplň URL i klíč.'; return; }
  try{
    sb = window.supabase.createClient(url, key);
    localStorage.setItem('planovac_sb_url', url);
    localStorage.setItem('planovac_sb_key', key);
    document.getElementById('setupCard').classList.add('hidden');
    checkSession();
  }catch(e){ errEl.textContent = 'Nepodařilo se připojit: ' + e.message; }
}
async function checkSession(){
  const { data: { session } } = await sb.auth.getSession();
  if(session) await afterLogin(); else document.getElementById('loginCard').classList.remove('hidden');
}
async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = 'Přihlášení selhalo: ' + error.message; return; }
  await afterLogin();
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }

async function afterLogin(){
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  const { data: { user } } = await sb.auth.getUser();
  myUser = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !profile){
    document.getElementById('main').innerHTML = `<p class="err">Chybí profil (role) pro tohoto uživatele — požádej manažera. (${error?error.message:''})</p>`;
    return;
  }
  myProfile = profile;
  document.getElementById('whoami').textContent = `${profile.full_name || user.email} · role: ${profile.role}`;
  await loadAll();
  render();
}

/* ============== NAČTENÍ DAT (RLS automaticky ořízne rozsah) ============== */
async function loadAll(){
  const [{data: advisors}, {data: plans}, {data: dist}, {data: actuals}] = await Promise.all([
    sb.from('advisors').select('*').order('name'),
    sb.from('plans').select('*'),
    sb.from('dist_global').select('*').eq('year', YEAR).maybeSingle(),
    sb.from('actuals').select('*').eq('year', YEAR),
  ]);
  cache.advisors = advisors || [];
  cache.plans = plans || [];
  cache.dist = (dist && dist.percentages) ? dist.percentages : Array(12).fill(Math.round((100/12)*100)/100);
  cache.actuals = actuals || [];
}

/* ============== POMOCNÉ FUNKCE ============== */
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getPlan(advisorId, metricId){
  const row = cache.plans.find(p=>p.advisor_id===advisorId && p.metric_id===metricId);
  return row ? Number(row.amount) : 0;
}
function baseMonthly(advisorId, metricId, idx){
  const plan = getPlan(advisorId, metricId);
  if(EVEN_METRICS.includes(metricId)) return plan/12;
  return plan * (cache.dist[idx]||0) / 100;
}
function getActual(advisorId, metricId, month){
  const row = cache.actuals.find(a=>a.advisor_id===advisorId && a.metric_id===metricId && a.month===month);
  return row ? Number(row.amount) : 0;
}
function fmtNum(v){ return Math.round(v||0).toLocaleString('cs-CZ'); }
const isManager = ()=> myProfile && myProfile.role === 'manager';

/* ============== RENDER ============== */
function render(){
  document.getElementById('tabs').innerHTML = TABS.map(t=>
    `<div class="tab ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`
  ).join('') + `<div class="tab secondary" style="margin-left:auto;color:#c0392b;" onclick="doLogout()">Odhlásit se</div>`;
  const main = document.getElementById('main');
  if(activeTab==='poradci') main.innerHTML = renderPoradci();
  else if(activeTab==='uzivatele') main.innerHTML = renderUzivatele();
  else if(activeTab==='plany') main.innerHTML = renderPlany();
  else if(activeTab==='rozlozeni') main.innerHTML = renderRozlozeni();
  else if(activeTab==='skutecnost') main.innerHTML = renderSkutecnost();
  else if(activeTab==='import') main.innerHTML = renderImport();
}
function switchTab(id){ activeTab = id; render(); }
async function refresh(){ await loadAll(); render(); }

/* ============== PORADCI ============== */
function renderPoradci(){
  const rows = cache.advisors.map(a=>`<tr><td>${escapeHtml(a.name)}</td><td>${a.is_team_leader?'<span class="badge">team leader</span>':''}</td></tr>`).join('');
  return `
  <div class="card">
    <h2>Poradci ve tvém rozsahu (${cache.advisors.length})</h2>
    <table><thead><tr><th style="text-align:left;">Jméno</th><th>Role</th></tr></thead><tbody>${rows||'<tr><td colspan=2 class="small">Zatím nikdo.</td></tr>'}</tbody></table>
    ${isManager() ? `
    <div class="row" style="margin-top:16px;">
      <input id="newAdvisorName" placeholder="Jméno nového poradce">
      <select id="newAdvisorTL"><option value="">— přímo pod manažerem —</option>${cache.advisors.filter(a=>a.is_team_leader).map(a=>`<option value="${a.id}">${escapeHtml(a.name)}</option>`).join('')}</select>
      <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="newAdvisorIsTL"> je team leader</label>
      <button onclick="addAdvisor()">+ Přidat</button>
    </div>` : '<p class="small">Přidávání nových poradců do týmu zatím řeší manažer.</p>'}
    <p id="poradciErr" class="err"></p>
  </div>`;
}
async function addAdvisor(){
  const name = document.getElementById('newAdvisorName').value.trim();
  const isTL = document.getElementById('newAdvisorIsTL').checked;
  const tlId = document.getElementById('newAdvisorTL').value || null;
  const errEl = document.getElementById('poradciErr');
  if(!name){ errEl.textContent = 'Zadej jméno.'; return; }
  const { error } = await sb.from('advisors').insert({ name, is_team_leader: isTL, team_leader_id: isTL ? null : tlId });
  if(error){ errEl.textContent = 'Chyba: ' + error.message; return; }
  await refresh();
}

/* ============== ROČNÍ PLÁNY ============== */
function renderPlany(){
  const rows = cache.advisors.map(a=>`<tr><td>${escapeHtml(a.name)}</td>${METRICS.map(m=>
    `<td><input type="number" min="0" value="${getPlan(a.id,m.id)||''}" placeholder="0" onchange="setPlan('${a.id}','${m.id}', this.value)"></td>`
  ).join('')}</tr>`).join('');
  return `
  <div class="card">
    <h2>Roční plán ${YEAR}</h2>
    <div class="readonly-note">Uložení proběhne rovnou do databáze — databáze zároveň sama ohlídá, že smíš upravit jen poradce ve svém rozsahu.</div>
    <table><thead><tr><th style="text-align:left;">Poradce</th>${METRICS.map(m=>`<th>${m.name}<br><span class="small" style="color:#cdd;">${m.unit}</span></th>`).join('')}</tr></thead>
    <tbody>${rows||'<tr><td colspan="7" class="small">Žádní poradci.</td></tr>'}</tbody></table>
  </div>`;
}
async function setPlan(advisorId, metricId, val){
  const amount = Math.max(0, Number(val)||0);
  const { error } = await sb.from('plans').upsert({ advisor_id: advisorId, metric_id: metricId, amount });
  if(error){ alert('Chyba při ukládání: ' + error.message); return; }
  await refresh();
}

/* ============== ROZLOŽENÍ % ============== */
function renderRozlozeni(){
  const sum = cache.dist.reduce((a,b)=>a+b,0);
  const cells = cache.dist.map((v,i)=>`<td><input type="number" min="0" max="100" value="${v||''}" ${isManager()?'':'disabled'} onchange="setDistCell(${i}, this.value)"></td>`).join('');
  return `
  <div class="card">
    <h2>Rozložení ročního plánu na měsíce (%)</h2>
    <p class="small">Jedna křivka pro celý tým (Kč produkty). Bankovní účty a X-SELL se vždy dělí rovnoměrně, bez ohledu na tuto křivku. ${isManager()?'':'Jen manažer může tuhle křivku měnit.'}</p>
    <table><thead><tr><th style="text-align:left;">%</th>${MONTHS.map(m=>`<th>${m.slice(0,3)}</th>`).join('')}<th>Součet</th></tr></thead>
    <tbody><tr><td>Rozložení</td>${cells}<td class="${Math.round(sum)===100?'':'err'}"><b>${Math.round(sum*10)/10}%</b></td></tr></tbody></table>
  </div>`;
}
async function setDistCell(idx, val){
  if(!isManager()){ alert('Jen manažer může měnit rozložení %.'); return; }
  const dist = [...cache.dist];
  dist[idx] = Math.max(0, Number(val)||0);
  const { error } = await sb.from('dist_global').upsert({ year: YEAR, percentages: dist });
  if(error){ alert('Chyba: ' + error.message); return; }
  await refresh();
}

/* ============== SKUTEČNOST ============== */
function renderSkutecnost(){
  const cm = window._skMonth || (new Date()).getMonth()+1;
  window._skMonth = cm;
  const monthTabs = MONTHS.map((mo,i)=>`<button class="${i+1===cm?'':'secondary'}" style="padding:6px 9px;font-size:12px;" onclick="window._skMonth=${i+1}; render()">${mo.slice(0,3)}</button>`).join('');
  const rows = cache.advisors.map(a=>`<tr><td>${escapeHtml(a.name)}</td>${METRICS.map(m=>{
    const plan = baseMonthly(a.id,m.id,cm-1);
    const act = getActual(a.id,m.id,cm);
    return `<td><input type="number" min="0" value="${act||''}" placeholder="0" onchange="setActual('${a.id}','${m.id}',${cm}, this.value)">
      <div class="small">plán ${fmtNum(plan)}</div></td>`;
  }).join('')}</tr>`).join('');
  return `
  <div class="card">
    <h2>Zadání skutečnosti — ${MONTHS[cm-1]} ${YEAR}</h2>
    <div class="row">${monthTabs}</div>
    <table><thead><tr><th style="text-align:left;">Poradce</th>${METRICS.map(m=>`<th>${m.name}</th>`).join('')}</tr></thead>
    <tbody>${rows||'<tr><td colspan="7" class="small">Žádní poradci.</td></tr>'}</tbody></table>
  </div>`;
}
async function setActual(advisorId, metricId, month, val){
  const amount = Math.max(0, Number(val)||0);
  const { error } = await sb.from('actuals').upsert({ advisor_id: advisorId, metric_id: metricId, month, year: YEAR, amount });
  if(error){ alert('Chyba při ukládání: ' + error.message); return; }
  await refresh();
}

/* ============== IMPORT ZÁLOHY (ze staré appky) ============== */
function renderImport(){
  if(!isManager()) return `<div class="card"><p class="small">Import zálohy může spustit jen manažer.</p></div>`;
  return `
  <div class="card">
    <h2>Import zálohy ze staré appky</h2>
    <p class="small">Nahraj JSON soubor, který sis stáhl tlačítkem „⬇ Záloha (JSON)" ve staré appce. Naimportují se: poradci, roční plány, rozložení %, skutečnost, úpravy z přerozdělení. Kampaně, 1-1 a denní evidence přijdou na řadu, až budou mít v téhle appce vlastní záložku.</p>
    <input type="file" id="importFile" accept=".json">
    <button onclick="startImport()" style="margin-left:10px;">Spustit import</button>
    <div id="importLog" style="margin-top:14px;font-size:12.5px;font-family:monospace;background:#f7f9fa;border:1px solid var(--border);border-radius:6px;padding:10px;max-height:320px;overflow-y:auto;"></div>
  </div>`;
}
async function startImport(){
  const fileInput = document.getElementById('importFile');
  const logEl = document.getElementById('importLog');
  logEl.innerHTML = '';
  const log = (msg)=>{ logEl.innerHTML += `<div>${msg}</div>`; logEl.scrollTop = logEl.scrollHeight; };
  if(!fileInput.files[0]){ log('⚠ Vyber nejdřív soubor.'); return; }

  let payload;
  try{
    const text = await fileInput.files[0].text();
    payload = JSON.parse(text);
  }catch(e){ log('⚠ Soubor se nepodařilo přečíst jako JSON: ' + e.message); return; }

  const st = payload.state || payload;
  const importYear = Number(st.year) || YEAR;
  log(`Začínám import (rok ${importYear})...`);

  // 1) Poradci — vloží se všichni bez nadřízeného, mapování starého id -> nové UUID
  const idMap = {};
  const localAdvisors = st.advisors || [];
  for(const a of localAdvisors){
    const { data, error } = await sb.from('advisors').insert({
      name: a.name, code: a.code || null,
      start_month: a.startMonth || null, end_month: a.endMonth || null,
      is_team_leader: !!a.isTeamLeader, hidden_daily: !!a.hiddenDaily
    }).select().single();
    if(error){ log(`⚠ Poradce ${a.name}: ${error.message}`); continue; }
    idMap[a.id] = data.id;
  }
  log(`✅ Poradci: ${Object.keys(idMap).length} / ${localAdvisors.length}`);

  // 2) Propojení nadřízených TL (druhé kolo, protože nová ID vznikají až v kroku 1)
  let tlLinked = 0;
  for(const a of localAdvisors){
    if(a.teamLeaderId && idMap[a.id] && idMap[a.teamLeaderId]){
      const { error } = await sb.from('advisors').update({ team_leader_id: idMap[a.teamLeaderId] }).eq('id', idMap[a.id]);
      if(!error) tlLinked++;
    }
  }
  log(`✅ Propojeno nadřízených: ${tlLinked}`);

  // 3) Roční plány
  let planCount = 0;
  for(const oldId in (st.plans||{})){
    if(!idMap[oldId]) continue;
    for(const metricId in st.plans[oldId]){
      const amount = st.plans[oldId][metricId];
      if(!amount) continue;
      const { error } = await sb.from('plans').upsert({ advisor_id: idMap[oldId], metric_id: metricId, amount });
      if(!error) planCount++;
    }
  }
  log(`✅ Roční plány: ${planCount} hodnot`);

  // 4) Rozložení %
  if(Array.isArray(st.distGlobal)){
    const { error } = await sb.from('dist_global').upsert({ year: importYear, percentages: st.distGlobal });
    log(error ? `⚠ Rozložení %: ${error.message}` : '✅ Rozložení % vloženo');
  }

  // 5) Skutečnost
  let actCount = 0;
  for(const oldId in (st.actual||{})){
    if(!idMap[oldId]) continue;
    for(const metricId in st.actual[oldId]){
      const arr = st.actual[oldId][metricId] || [];
      for(let i=0;i<12;i++){
        const amount = arr[i];
        if(!amount) continue;
        const { error } = await sb.from('actuals').upsert({ advisor_id: idMap[oldId], metric_id: metricId, month: i+1, year: importYear, amount });
        if(!error) actCount++;
      }
    }
  }
  log(`✅ Skutečnost: ${actCount} hodnot`);

  // 6) Úpravy z přerozdělení
  let adjCount = 0;
  for(const oldId in (st.adj||{})){
    if(!idMap[oldId]) continue;
    for(const metricId in st.adj[oldId]){
      const arr = st.adj[oldId][metricId] || [];
      for(let i=0;i<12;i++){
        const amount = arr[i];
        if(!amount) continue;
        const { error } = await sb.from('adjustments').upsert({ advisor_id: idMap[oldId], metric_id: metricId, month: i+1, year: importYear, amount });
        if(!error) adjCount++;
      }
    }
  }
  log(`✅ Úpravy z přerozdělení: ${adjCount} hodnot`);

  log('🎉 Import hotov. Kampaně, 1-1 a denní evidence se přenesou, až přidáme jejich záložky.');
  await refresh();
}

/* ============== UŽIVATELÉ (vytváření přihlášení pro TL/poradce) ============== */
function renderUzivatele(){
  if(!isManager()) return `<div class="card"><p class="small">Správu uživatelů vidí jen manažer.</p></div>`;
  const advisorOpts = cache.advisors.map(a=>`<option value="${a.id}">${escapeHtml(a.name)}${a.is_team_leader?' (TL)':''}</option>`).join('');
  return `
  <div class="card">
    <h2>Vytvořit přihlášení pro poradce/TL</h2>
    <div class="readonly-note">
      Než appka může uživatele vytvořit, musí být v Supabase (jednou, natrvalo) vypnuté potvrzování e-mailu:
      <b>Authentication → Sign In / Providers → Email → vypni „Confirm email"</b>. Bez toho účet vznikne, ale nepůjde se jím hned přihlásit.
    </div>
    <div class="row">
      <div><label>Jméno a příjmení</label><input id="uJmeno" placeholder="Jméno Příjmení"></div>
      <div><label>Propojit s poradcem</label><select id="uAdvisor"><option value="">— nepropojovat (jen role) —</option>${advisorOpts}</select></div>
    </div>
    <div class="row">
      <div><label>E-mail</label><input id="uEmail" type="email" placeholder="jmeno@firma.cz"></div>
      <div><label>Heslo (dej mu ho pak sám/sama)</label><input id="uHeslo" type="text" placeholder="min. 6 znaků"></div>
      <div><label>Role</label><select id="uRole"><option value="team_leader">Team leader</option><option value="advisor">Obchodník</option></select></div>
    </div>
    <button onclick="createUser()">Vytvořit uživatele</button>
    <p id="uzivateleLog" class="small" style="margin-top:10px;"></p>
  </div>`;
}
async function createUser(){
  const full_name = document.getElementById('uJmeno').value.trim();
  const email = document.getElementById('uEmail').value.trim();
  const password = document.getElementById('uHeslo').value;
  const role = document.getElementById('uRole').value;
  const advisor_id = document.getElementById('uAdvisor').value || null;
  const logEl = document.getElementById('uzivateleLog');
  logEl.textContent = '';
  if(!email || !password || password.length<6){ logEl.textContent = '⚠ Vyplň e-mail a heslo (aspoň 6 znaků).'; return; }

  // Dočasný samostatný klient — persistSession:false = nikdy se nedotkne uloženého přihlášení manažera
  const tempClient = window.supabase.createClient(
    localStorage.getItem('planovac_sb_url'),
    localStorage.getItem('planovac_sb_key'),
    { auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false } }
  );
  const { data, error } = await tempClient.auth.signUp({ email, password });
  if(error){ logEl.innerHTML = `⚠ Vytvoření účtu selhalo: ${error.message}`; return; }
  if(!data.user){ logEl.innerHTML = '⚠ Účet se nevytvořil (neznámá chyba).'; return; }
  if(!data.session){
    logEl.innerHTML = `⚠ Účet vznikl, ale čeká na potvrzení e-mailu — vypni „Confirm email" v Supabase (viz poznámka výš) a zkus to znovu, nebo účet smaž a založ znovu.`;
    return;
  }

  const { error: profErr } = await sb.from('profiles').insert({ id: data.user.id, role, advisor_id, full_name });
  if(profErr){ logEl.innerHTML = `⚠ Účet vznikl, ale profil se nepodařilo uložit: ${profErr.message}`; return; }

  logEl.innerHTML = `✅ Vytvořeno. Pošli mu/jí: e-mail <b>${escapeHtml(email)}</b> a heslo <b>${escapeHtml(password)}</b> (ať si ho po prvním přihlášení změní).`;
  document.getElementById('uJmeno').value='';
  document.getElementById('uEmail').value='';
  document.getElementById('uHeslo').value='';
}

/* ============== START ============== */
window.addEventListener('DOMContentLoaded', ()=>{
  const url = localStorage.getItem('planovac_sb_url');
  const key = localStorage.getItem('planovac_sb_key');
  if(url) document.getElementById('sbUrl').value = url;
  if(key) document.getElementById('sbKey').value = key;
  if(url && key){
    sb = window.supabase.createClient(url, key);
    checkSession();
  }
});
</script>
