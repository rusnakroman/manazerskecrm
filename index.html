<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Plánovač výsledků týmu</title>
<style>
  :root{
    --cyan:#0099CC; --dark:#003366; --green:#82B800; --orange:#FF6000;
    --bg:#f4f6f8; --border:#cfd6dc;
  }
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#1a1a1a;margin:0;padding:0;}
  header{background:var(--dark);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.3px;}
  header .yearbox{display:flex;align-items:center;gap:6px;font-size:13px;}
  header input{width:70px;padding:4px 6px;border-radius:4px;border:none;text-align:center;font-weight:700;}
  .tabs{display:flex;flex-direction:column;gap:2px;background:#fff;border-bottom:2px solid var(--border);padding:6px 24px;}
  .tab-group{display:flex;align-items:center;gap:2px;flex-wrap:wrap;}
  .tab-group-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#8a97a3;font-weight:800;margin-right:8px;white-space:nowrap;min-width:150px;}
  .tab{padding:9px 14px;cursor:pointer;font-weight:700;color:#556;border-bottom:3px solid transparent;white-space:nowrap;font-size:13px;user-select:none;border-radius:4px 4px 0 0;}
  .tab.active{color:var(--cyan);border-bottom-color:var(--cyan);background:#f0f9fc;}
  .tab:hover{color:var(--dark);}
  .tabdesc{font-style:italic;color:#667788;font-size:13px;margin:0 0 16px;}
  /* Zvýraznění řádku a sloupce v mřížkách pro zadávání (Skutečnost) — snazší nalezení buňky */
  table.gridtable tr:focus-within td{background:#fff6d8!important;}
  table.gridtable tr:focus-within td:first-child{background:#ffe9a8!important;font-weight:700;}
  table.gridtable td.cur-month, table.gridtable th.cur-month{background:#d6f0f7!important;}
  table.gridtable tr:focus-within td.cur-month{background:#ffd66b!important;}
  /* Živé zvýraznění sloupce (hlavička) podle toho, kde má uživatel focus — sloupce 2..13 = měsíce */
  table.gridtable:has(tbody tr td:nth-child(1) input:focus) thead th:nth-child(2){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(2) input:focus) thead th:nth-child(3){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(3) input:focus) thead th:nth-child(4){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(4) input:focus) thead th:nth-child(5){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(5) input:focus) thead th:nth-child(6){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(6) input:focus) thead th:nth-child(7){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(7) input:focus) thead th:nth-child(8){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(8) input:focus) thead th:nth-child(9){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(9) input:focus) thead th:nth-child(10){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(10) input:focus) thead th:nth-child(11){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(11) input:focus) thead th:nth-child(12){background:var(--orange)!important;color:#fff;}
  table.gridtable:has(tbody tr td:nth-child(12) input:focus) thead th:nth-child(13){background:var(--orange)!important;color:#fff;}
  main{padding:20px 24px 60px;max-width:1500px;margin:0 auto;}
  .card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:18px;}
  .card h2{font-size:15px;color:var(--dark);margin:0 0 12px;text-transform:uppercase;letter-spacing:.3px;}
  .card h3{font-size:13px;color:var(--cyan);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.3px;}
  table{border-collapse:collapse;width:100%;background:#fff;font-size:12.5px;}
  th{background:var(--dark);color:#fff;padding:10px 8px;text-align:right;font-weight:700;white-space:nowrap;}
  th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:inherit;}
  td{padding:9px 8px;border-bottom:1px solid var(--border);text-align:right;line-height:1.4;}
  tbody tr:nth-child(even) td{background:#f4f7f9;}
  tbody tr:hover td{background:#eaf3f8;}
  tr.total td{font-weight:700;background:#e8f4f9!important;border-top:2px solid var(--cyan);}
  input[type=number]{width:100%;min-width:56px;border:1px solid var(--border);border-radius:4px;padding:4px 3px;text-align:right;font-size:12.5px;}
  input[type=text]{width:100%;border:1px solid var(--border);border-radius:4px;padding:6px 8px;text-align:left;font-size:13px;}
  button{background:var(--cyan);color:#fff;border:none;border-radius:5px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px;}
  button:hover{background:#007fa8;}
  button.secondary{background:#fff;color:var(--dark);border:1px solid var(--border);}
  button.secondary:hover{background:#f0f3f5;}
  button.danger{background:#fff;color:#c0392b;border:1px solid #e2b4ac;}
  button.danger:hover{background:#fdf1ef;}
  button:disabled{opacity:.45;cursor:not-allowed;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;}
  .badge.ended{background:#ffe4e0;color:#c0392b;}
  .badge.active{background:#e6f4d9;color:#5a7a00;}
  .badge.start{background:#e0f0fa;color:#0077a3;}
  .sum-ok{color:var(--green);font-weight:700;}
  .sum-warn{color:#b5850a;font-weight:700;}
  .sum-bad{color:#c0392b;font-weight:700;}
  .grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;}
  @media (max-width:900px){.grid2{grid-template-columns:1fr;}}
  select{padding:7px;border:1px solid var(--border);border-radius:5px;font-size:13px;background:#fff;}
  .small{font-size:12px;color:#667788;}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
  .field label{font-size:12px;font-weight:700;color:var(--dark);}
  .tablewrap{overflow-x:auto;}
  .pill{display:inline-flex;align-items:center;gap:6px;background:#f0f3f5;border-radius:6px;padding:6px 10px;font-size:12.5px;}
  .checklist{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:8px;}
  .checklist label{display:flex;align-items:center;gap:8px;font-size:13px;}
  .logitem{border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12.5px;background:#fbfcfd;}
  .logitem b{color:var(--dark);}
  .empty{color:#8a97a3;font-style:italic;padding:20px;text-align:center;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.2);opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .actions-right{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap;}
  td.blk-plan{background:#e2e8ec !important;}
  td.bg-ok{background:#8fe08a !important;color:#0a3d0a;font-weight:800;}
  td.bg-warn{background:#ffc266 !important;color:#5c3a00;font-weight:800;}
  td.bg-bad{background:#ff8a80 !important;color:#5c0a04;font-weight:800;}
  td.blk-actual, td.blk-zbyva, td.blk-plneni{background:#fbe9e7 !important;}
  .predtext{white-space:pre;font-family:'Courier New',monospace;font-size:13px;background:#f7f9fa;border:1px solid var(--border);border-radius:6px;padding:12px 14px;line-height:1.6;}
</style>
</head>
<body>

<div id="authGate" class="card" style="max-width:480px;margin:60px auto;">
  <h2 style="margin-top:0;">🔒 Přihlášení</h2>
  <div id="setupBlock">
    <p class="small">Připojení k databázi (jen napoprvé — uloží se v tomhle prohlížeči).</p>
    <div class="field"><label>Supabase URL</label><input type="text" id="sbUrl" placeholder="https://xxxx.supabase.co"></div>
    <div class="field"><label>Anon public key</label><input type="text" id="sbKey" placeholder="eyJhbGciOi..."></div>
    <button onclick="connectSupabase()">Připojit</button>
    <p id="setupErr" class="small" style="color:#c0392b;"></p>
  </div>
  <div id="loginBlock" style="display:none;">
    <div class="field"><label>E-mail</label><input type="email" id="loginEmail"></div>
    <div class="field"><label>Heslo</label><input type="password" id="loginPass"></div>
    <button onclick="doLogin()">Přihlásit se</button>
    <p id="loginErr" class="small" style="color:#c0392b;"></p>
  </div>
</div>

<div id="appRoot" style="display:none;">
<header>
  <h1>📊 Plánovač výsledků týmu</h1>
  <div class="row" style="gap:14px;">
    <span id="whoami" class="small" style="color:#cfe8f2;"></span>
    <button class="secondary" style="padding:5px 10px;font-size:12px;" onclick="doLogout()">Odhlásit</button>
    <span id="saveStatus" class="small" style="color:#cfe8f2;">—</span>
    <button class="secondary" style="padding:5px 10px;font-size:12px;" onclick="exportBackup()">⬇ Záloha (JSON)</button>
    <label class="secondary" style="padding:5px 10px;font-size:12px;border-radius:5px;border:1px solid var(--border);background:#fff;cursor:pointer;">
      ⬆ Obnovit ze zálohy<input type="file" accept=".json" style="display:none;" onchange="importBackup(this.files[0])">
    </label>
    <div class="yearbox">Rok <input id="yearInput" type="text" value="2026"></div>
    <button class="secondary" style="padding:5px 10px;font-size:12px;" onclick="startNewYear()">📅 Založit nový rok</button>
  </div>
</header>
<div class="tabs" id="tabs"></div>
<main id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ============== SUPABASE PŘIHLÁŠENÍ ============== */
let sb = null;
let myUser = null;
let myProfile = null; // {role, advisor_id, full_name}

function connectSupabase(){
  const url = document.getElementById('sbUrl').value.trim();
  const key = document.getElementById('sbKey').value.trim();
  const errEl = document.getElementById('setupErr');
  errEl.textContent = '';
  if(!url || !key){ errEl.textContent = 'Vyplň URL i klíč.'; return; }
  try{
    sb = window.supabase.createClient(url, key);
    localStorage.setItem('planovac_sb_url', url);
    localStorage.setItem('planovac_sb_key', key);
    document.getElementById('setupBlock').style.display = 'none';
    checkSession();
  }catch(e){ errEl.textContent = 'Nepodařilo se připojit: ' + e.message; }
}
async function checkSession(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){ await afterLogin(); }
  else{ document.getElementById('loginBlock').style.display = 'block'; }
}
async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = 'Přihlášení selhalo: ' + error.message; return; }
  await afterLogin();
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }

async function afterLogin(){
  const { data: { user } } = await sb.auth.getUser();
  myUser = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !profile){
    document.getElementById('authGate').innerHTML = `<h2>Chybí profil</h2><p class="small">Přihlášení proběhlo, ale nemáš vytvořený profil (role) v tabulce "profiles" — požádej manažera, ať tě tam přidá.</p><p class="small" style="color:#c0392b;">${error?error.message:'chybí řádek'}</p>`;
    return;
  }
  myProfile = profile;
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('whoami').textContent = `${profile.full_name || user.email} · ${profile.role}`;
  await loadState();
}

window.addEventListener('DOMContentLoaded', ()=>{
  const url = localStorage.getItem('planovac_sb_url');
  const key = localStorage.getItem('planovac_sb_key');
  if(url) document.getElementById('sbUrl').value = url;
  if(key) document.getElementById('sbKey').value = key;
  if(url && key){
    document.getElementById('setupBlock').style.display = 'none';
    sb = window.supabase.createClient(url, key);
    checkSession();
  }
});

/* ============== KONSTANTY ============== */
const METRICS = [
  {id:'zivot',  name:'Náš život',                unit:'Kč'},
  {id:'domov',  name:'Náš domov',                unit:'Kč'},
  {id:'auto',   name:'Naše auto',                unit:'Kč'},
  {id:'podnik', name:'Pojištění podnik. rizik',      unit:'Kč (nárůst kmene)'},
  {id:'ucty',   name:'Bankovní účty',                unit:'ks'},
  {id:'xsell',  name:'X-SELL',                       unit:'ks'},
];
const MONTHS = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const MONTHS_FULL = ['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'];
const MONTH_QUARTER = [1,1,1,2,2,2,3,3,3,4,4,4]; // kvartál pro každý měsíc (index 0-11)

// Doplňková data — zadávají se příležitostně, nejsou součástí měsíčního plánu/skutečnosti
const EXTRA_FIELDS = [
  {id:'presjednani_auto',  label:'% přesjednání',        product:'Naše auto'},
  {id:'presjednani_domov', label:'% přesjednání',        product:'Náš domov'},
  {id:'slevy_auto',        label:'% slev',               product:'Naše auto'},
  {id:'rizikova_zivot',    label:'Riziková složka',      product:'Náš život'},
];

// Denní evidence — manažerský checklist "Moje atomové návyky" (výchozí sada, dál editovatelná v appce)
const DEFAULT_DAILY_HABITS = [
  {id:'kampane',   label:'Kontrola kampaní'},
  {id:'leady',     label:'Kontrola leadů — jednotlivé kampaně'},
  {id:'chybne',    label:'Kontrola chybných smluv'},
  {id:'neverif',   label:'Kontrola neverifikovaných smluv'},
  {id:'pocet_op',  label:'Kontrola počtu OP'},
  {id:'ukoly',     label:'Kontrola mých zadaných úkolů'},
  {id:'followup',  label:'Jeden konkrétní follow-up — dotáhnu jednu věc zadanou dřív (ne novou)'},
  {id:'visici',    label:'Nesplněný úkol nenechávám viset — dnes ho vymáhám, nebo ruším'},
];
const DEFAULT_WEEKLY_HABITS = [
  {id:'predikce_produkce', label:'Poradci — predikce a produkce (týdenní review)'},
];
const DEFAULT_DAILY_FIELDS = [
  {id:'calls', label:'Telefonáty'},
  {id:'meetings', label:'Schůzky'},
  {id:'cases', label:'Obchodní případy'},
  {id:'xsell', label:'X-SELL formuláře'},
  {id:'askedNext', label:'Zeptal se na další produkt (klientů)'},
];

/* ============== STAV ============== */
let state = {
  year: '2026',
  currentMonth: (new Date()).getMonth()+1,
  advisors: [],     // {id, name, endMonth: null|1-12}
  plans: {},        // plans[advisorId][metricId] = number (annual)
  distGlobal: [],  // [12 percentages] — STEJNÉ PRO VŠECHNY PORADCE A VŠECHNY PRODUKTY
  adj: {},          // adj[advisorId][metricId] = [12 numbers], additive Kč/ks adjustments
  actual: {},       // actual[advisorId][metricId] = [12 numbers], skutečně splněno
  extra: {},        // extra[advisorId][fieldId] = number — doplňková data (přesjednání, slevy, riziková složka...)
  extraNote: {},    // extraNote[advisorId] = text — poznámka k doplňkovým datům
  teamName: 'Ústí nad Labem',
  weeklyManual: {pohovory:0, kontakty:0}, // ručně dopisovaná čísla do predikce
  oneOnOne: {}, // oneOnOne[advisorId] = [{date, prep, note, motivace, akcniPlan, dusledek, ukoly}] — historie záznamů z 1-1
  oneOnOneDraft: {}, // oneOnOneDraft[advisorId] = rozepsaný, zatím neuložený záznam (přežije reload)
  yearArchive: {}, // yearArchive[rok] = {plans, actual, adj, transferLog} — archiv při založení nového roku
  campaigns: [],   // [{id, name, kind:'kampan'|'lead'}]
  campaignWeekly: {}, // campaignWeekly[campaignId][weekKey][advisorId] = {leady,uzavreno,xsellForms,klientiKalkulace,obchody,novKc,novKs}
  realTeamPlan: {}, // realTeamPlan[metricId] = roční cílová částka od vedení (nepovinné, obvykle nižší než součet individuálních plánů)
  transferLog: []   // {id,date,metricId,fromLabel,fromId,fromPerMonth,fromMonth,toMonth,targets:[{id,name,perMonth}],note}
};
// Denní evidence má vlastní, samostatně ukládaný stav (jiný storage klíč), aby zbytek appky zůstal lehký
let dailyState = {
  daily: {},         // daily[advisorId][YYYY-MM-DD] = {calls,meetings,cases,xsell,askedNext,note}
  dailyManager: {},  // dailyManager[YYYY-MM-DD] = {habits:{habitId:bool}, weekly:{habitId:bool}, personOfDay:advisorId, personOfDayNote:string}
  config: { habits: null, weekly: null, fields: null } // editovatelné body checklistu a sloupců (null = použij výchozí sadu)
};
let activeTab = 'dashboard';
let saveTimer = null;
let saveDailyTimer = null;

/* ============== PERSISTENCE ============== */
async function loadState(){
  let loaded = false;
  if(storageAvailable()){
    try{
      const res = await window.storage.get('planovac_state_v1', false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state = Object.assign(state, parsed);
        loaded = true;
      }
    }catch(e){ /* žádná uložená data zatím */ }
    try{
      const res2 = await window.storage.get('planovac_daily_v1', false);
      if(res2 && res2.value){
        const parsed2 = JSON.parse(res2.value);
        dailyState = Object.assign(dailyState, parsed2);
      }
    }catch(e){ /* žádná uložená denní data zatím */ }
  }
  if(!loaded && localStorageAvailable()){
    try{
      const raw = localStorage.getItem('planovac_state_v1');
      if(raw) state = Object.assign(state, JSON.parse(raw));
    }catch(e){ /* žádná uložená data zatím */ }
    try{
      const rawD = localStorage.getItem('planovac_daily_v1');
      if(rawD) dailyState = Object.assign(dailyState, JSON.parse(rawD));
    }catch(e){ /* žádná uložená denní data zatím */ }
  }
  // migrace ze starší verze (rozložení bývalo per-poradce) + výchozí rovnoměrné %
  if(!Array.isArray(state.distGlobal) || state.distGlobal.length!==12){
    state.distGlobal = Array(12).fill(Math.round((100/12)*100)/100);
  }
  if(!state.actual) state.actual = {};
  if(!state.extra) state.extra = {};
  if(!state.extraNote) state.extraNote = {};
  if(!state.teamName) state.teamName = 'Ústí nad Labem';
  if(!state.weeklyManual) state.weeklyManual = {pohovory:0, kontakty:0};
  if(!state.oneOnOne) state.oneOnOne = {};
  if(!state.oneOnOneDraft) state.oneOnOneDraft = {};
  if(!state.yearArchive) state.yearArchive = {};
  if(!state.campaigns) state.campaigns = [];
  if(!state.campaignWeekly) state.campaignWeekly = {};
  if(!state.realTeamPlan) state.realTeamPlan = {};
  if(!state.currentMonth) state.currentMonth = (new Date()).getMonth()+1;
  if(!dailyState.daily) dailyState.daily = {};
  if(!dailyState.dailyManager) dailyState.dailyManager = {};
  if(!dailyState.config) dailyState.config = {habits:null, weekly:null, fields:null};
  delete state.dist; // starý per-poradce formát už se nepoužívá

  // Poradci, plány, skutečnost, úpravy, rozložení %, přerozdělení, reálný plán —
  // tohle už je "pravda" v databázi (Supabase), lokální kopie přepíšeme čerstvými daty.
  if(sb && myUser){
    await loadFromSupabase();
  }
  state.advisors.forEach(a=>{ if(a.isTeamLeader===undefined) a.isTeamLeader=false; if(a.teamLeaderId===undefined) a.teamLeaderId=null; });

  render();
  if(storageAvailable() || localStorageAvailable()) markSaved(); else markNoStorage();
}

async function loadFromSupabase(){
  try{
    const year = Number(state.year) || new Date().getFullYear();

    const { data: advisorsRows, error: advErr } = await sb.from('advisors').select('*').order('name');
    if(advErr) throw advErr;
    state.advisors = (advisorsRows||[]).map(r=>({
      id: r.id, name: r.name, code: r.code||'',
      startMonth: r.start_month, endMonth: r.end_month,
      isTeamLeader: r.is_team_leader, teamLeaderId: r.team_leader_id,
      hiddenDaily: r.hidden_daily
    }));

    const { data: planRows } = await sb.from('plans').select('*');
    state.plans = {};
    (planRows||[]).forEach(r=>{ if(!state.plans[r.advisor_id]) state.plans[r.advisor_id]={}; state.plans[r.advisor_id][r.metric_id]=Number(r.amount)||0; });

    const { data: actualRows } = await sb.from('actuals').select('*').eq('year', year);
    state.actual = {};
    (actualRows||[]).forEach(r=>{
      if(!state.actual[r.advisor_id]) state.actual[r.advisor_id]={};

function baseMonthly(aId,mId,idx){
  const plan = getPlan(aId,mId);
  const dist = getDistGlobal();
  const a = advisor(aId);
  const isEven = (mId==='ucty' || mId==='xsell'); // rovnoměrně, ne podle % křivky
  if(a && a.startMonth && a.startMonth>1){
    if(idx+1 < a.startMonth) return 0; // před nástupem žádný plán
    const activeMonths = 12 - a.startMonth + 1;
    if(isEven) return activeMonths>0 ? plan/activeMonths : 0;
    let sumRemaining = 0;
    for(let i=a.startMonth-1;i<12;i++) sumRemaining += (dist[i]||0);
    if(sumRemaining<=0) return 0;
    return plan * (dist[idx]||0) / sumRemaining; // celoroční plán se rozpočítá jen na měsíce od nástupu do konce roku
  }
  if(isEven) return plan/12;
  return plan * (dist[idx]||0) / 100;
}
function finalMonthly(aId,mId,idx){
  return baseMonthly(aId,mId,idx) + (getAdj(aId,mId)[idx]||0);

function isEndedAt(a, monthIdx1based){ return a.endMonth && monthIdx1based > a.endMonth; }
function isBeforeStart(a, monthIdx1based){ return a.startMonth && monthIdx1based < a.startMonth; }
function isNovacek(a){
  if(a.endMonth) return false; // ukončení má vždy přednost
  if(!a.startMonth) return false;
  const cm = state.currentMonth || (new Date()).getMonth()+1;
  return cm >= a.startMonth && cm <= a.startMonth + 2; // nováček max. 3 měsíce od nástupu
}

}
function isoWeekNumber(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil(((d - yearStart) / 86400000 + 1)/7);
}
// časový úsek pro report: 'ytd_month' (od ledna do konce měsíce), 'month' (jen daný měsíc),
// 'ytd_quarter' (od ledna do konce kvartálu), 'quarter' (jen daný kvartál), 'year' (celý rok)
function sliceRange(slice, cm){
  const qEnd = MONTH_QUARTER[cm-1]*3, qStart = qEnd-2;
  if(slice==='ytd_month') return [1, cm];
  if(slice==='month') return [cm, cm];
  if(slice==='ytd_quarter') return [1, qEnd];
  if(slice==='quarter') return [qStart, qEnd];
  if(slice==='year') return [1, 12];
  return [1, cm];
}
function sliceValues(aId, mId, slice, cm){
  const [from, to] = sliceRange(slice, cm);
  let plan=0, actual=0;
  for(let i=from-1;i<to;i++){ plan += finalMonthly(aId,mId,i); actual += (getActual(aId,mId)[i]||0); }
  return {plan, actual};
}

// Inline styl (ne jen CSS třída) — Outlook/Gmail po vložení z clipboardu často ignorují CSS třídy,
// ale styl přímo v atributu style="" se propíše skoro vždy.

function gridTabNav(e){
  if(e.key !== 'Tab') return;
  const current = e.target;
  const table = current.closest('table');
  if(!table) return;
  const inputs = Array.from(table.querySelectorAll('input[data-key]'));
  const idx = inputs.indexOf(current);
  if(idx===-1) return;
  const nextIdx = e.shiftKey ? idx-1 : idx+1;
  if(nextIdx<0 || nextIdx>=inputs.length) return; // necháme prohlížeč vytabovat ven z tabulky přirozeně
  e.preventDefault();
  const nextKey = inputs[nextIdx].getAttribute('data-key');
  current.blur(); // vyvolá onchange -> uloží hodnotu -> re-render
  setTimeout(()=>{
    const el = document.querySelector(`[data-key="${CSS.escape(nextKey)}"]`);
    if(el){ el.focus(); if(el.select) el.select(); }
  }, 0);
}
function copyPlainText(elId){

  const text = el.value !== undefined ? el.value : el.textContent;

      <td style="text-align:center;"><select onchange="setEndMonth('${a.id}', this.value)">${endOpts}</select></td>
      <td style="text-align:center;">${statusBadge}</td>
      <td style="text-align:center;"><input type="checkbox" ${a.isTeamLeader?'checked':''} onchange="setIsTeamLeader('${a.id}', this.checked)"></td>
      <td style="text-align:center;"><select onchange="setTeamLeader('${a.id}', this.value)">${tlOpts}</select></td>
      <td style="text-align:center;"><button class="danger" onclick="removeAdvisor('${a.id}','${escapeHtml(a.name)}')">Smazat</button></td>
    </tr>`;
  }).join('');
  return `
  <div class="card">
    <h2>Poradci v týmu (${state.advisors.length})</h2>
    <div class="tablewrap">
    <table>
      <thead><tr><th style="text-align:left;">Číslo</th><th style="text-align:left;">Jméno</th><th style="text-align:center;">Nástup</th><th style="text-align:center;">Konec spolupráce</th><th style="text-align:center;">Stav</th><th style="text-align:center;">Je TL</th><th style="text-align:center;">Nadřízený TL</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="8" class="empty">Zatím žádní poradci — přidej prvního níže.</td></tr>'}</tbody>
    </table>
    </div>
    <div class="row" style="margin-top:14px;">
      <input type="text" id="newAdvisorName" placeholder="Jméno nového poradce" style="max-width:280px;" onkeydown="if(event.key==='Enter')addAdvisorFromInput()">
      <button onclick="addAdvisorFromInput()">+ Přidat poradce</button>
    </div>
    <p class="small" style="margin-top:10px;">„Je TL" = team leader (i on je obchodník). Kdo nemá nadřízeného, je přímo pod tebou — podle toho jde filtrovat Dashboard a Report.</p>
  </div>
  ${Object.keys(state.yearArchive).length ? `
  <div class="card">
    <h2>Archiv minulých let</h2>
    <p class="small" style="margin-bottom:10px;">Roky založené tlačítkem „Založit nový rok" v hlavičce — plány a skutečnost té sezóny, ke stažení jako záloha.</p>
    ${Object.keys(state.yearArchive).sort().reverse().map(y=>`<div class="row" style="margin-bottom:6px;"><span class="pill">${y}</span><button class="secondary" onclick="downloadYearArchive('${y}')">⬇ Stáhnout JSON</button></div>`).join('')}
  </div>` : ''}`;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function advisorLabel(a){ return (a.code ? a.code+' ' : '') + a.name; }
async function dbUpdateAdvisor(id, fields){
  if(!sb) return;
  try{ const { error } = await sb.from('advisors').update(fields).eq('id', id); if(error) throw error; }
  catch(e){ console.error('Uložení poradce selhalo', e); toast('Uložení se nepodařilo: ' + e.message); }
}
async function addAdvisorFromInput(){
  const inp = document.getElementById('newAdvisorName');
  const name = inp.value.trim();
  if(!name){ toast('Zadej jméno poradce'); return; }
  if(sb){
    try{
      const { data, error } = await sb.from('advisors').insert({ name }).select().single();
      if(error) throw error;
      state.advisors.push({id:data.id, name:data.name, code:'', endMonth:null, startMonth:null, isTeamLeader:false, teamLeaderId:null, hiddenDaily:false});
      inp.value = '';
      render();
    }catch(e){ toast('Přidání se nepodařilo: ' + e.message); }
    return;
  }
  state.advisors.push({id:uid(), name, code:'', endMonth:null, startMonth:null, isTeamLeader:false, teamLeaderId:null});
  saveState(); render();
}
function setIsTeamLeader(id, val){
  const a = advisor(id); if(!a) return;
  a.isTeamLeader = !!val;
  if(a.isTeamLeader) a.teamLeaderId = null; // TL je vždy přímo pod manažerem
  dbUpdateAdvisor(id, {is_team_leader:a.isTeamLeader, team_leader_id:a.teamLeaderId});
  saveState(); render();
}
function setTeamLeader(id, val){
  const a = advisor(id); if(!a) return;
  a.teamLeaderId = val || null;
  dbUpdateAdvisor(id, {team_leader_id:a.teamLeaderId});
  saveState(); render();
}
function toggleHiddenDaily(id){
  const a = advisor(id); if(!a) return;
  a.hiddenDaily = !a.hiddenDaily;
  dbUpdateAdvisor(id, {hidden_daily:a.hiddenDaily});
  saveState(); render();
}
function filteredAdvisors(filter){
  filter = filter===undefined ? state._teamFilter : filter;
  if(!filter || filter==='all') return state.advisors;
  if(filter==='direct') return state.advisors.filter(a=>!a.teamLeaderId && !a.isTeamLeader);
  return state.advisors.filter(a=> a.id===filter || a.teamLeaderId===filter);
}
function activeOnly(list){ return list.filter(a=>!a.endMonth); }
function teamFilterOptionsHtml(){
  const teamLeaders = state.advisors.filter(a=>a.isTeamLeader);
  const cur = state._teamFilter || 'all';
  const opts = [
    `<option value="all" ${cur==='all'?'selected':''}>Celý tým</option>`,
    `<option value="direct" ${cur==='direct'?'selected':''}>Jen přímo pode mnou</option>`,
    ...teamLeaders.map(tl=>`<option value="${tl.id}" ${cur===tl.id?'selected':''}>Tým — ${escapeHtml(tl.name)}</option>`)
  ];
  return opts.join('');
}
function setAdvisorCode(id, val){
  const a = advisor(id); if(!a) return;
  a.code = val.trim();
  dbUpdateAdvisor(id, {code:a.code});
  saveState();
}
function renameAdvisor(id, name){
  const a = advisor(id); if(!a) return;
  a.name = name.trim() || a.name;
  dbUpdateAdvisor(id, {name:a.name});
  saveState();
}
function setEndMonth(id, val){
  const a = advisor(id); if(!a) return;
  a.endMonth = val ? Number(val) : null;
  dbUpdateAdvisor(id, {end_month:a.endMonth});
  saveState(); render();
}
function setStartMonth(id, val){
  const a = advisor(id); if(!a) return;
  a.startMonth = val ? Number(val) : null;
  dbUpdateAdvisor(id, {start_month:a.startMonth});
  saveState(); render();
}
async function removeAdvisor(id, name){
  if(!confirm(`Opravdu smazat poradce „${name}"? Smažou se i jeho plány a rozložení.`)) return;
  state.advisors = state.advisors.filter(a=>a.id!==id);
  delete state.plans[id]; delete state.adj[id]; delete state.actual[id]; delete state.extra[id];
  if(sb){
    try{ const { error } = await sb.from('advisors').delete().eq('id', id); if(error) throw error; }
    catch(e){ toast('Smazání v databázi selhalo: ' + e.message); }
  }
  saveState(); render();
}

/* ============== TAB: ROČNÍ PLÁNY ============== */
function renderPlany(){
  if(state.advisors.length===0) return emptyAdvisorsCard();
  const cols = METRICS.map(m=>`<th>${m.name}<br><span class="small" style="color:#cdd;">${m.unit}</span></th>`).join('');
  const rows = state.advisors.map(a=>{
    const cells = METRICS.map(m=>`<td><input type="number" min="0" value="${getPlan(a.id,m.id)||''}" placeholder="0" onchange="setPlan('${a.id}','${m.id}', this.value); refreshTotals()"></td>`).join('');
    return `<tr><td>${escapeHtml(a.name)} ${statusBadgeHtml(a)}</td>${cells}</tr>`;
  }).join('');
  const totalCells = METRICS.map(m=>{
    const sum = state.advisors.reduce((s,a)=>s+getPlan(a.id,m.id),0);
    return `<td id="tot-${m.id}">${fmt(m.id,sum)}</td>`;
  }).join('');
  return `
  <div class="card">
    <h2>Roční plán ${state.year} — podle poradce a produktu</h2>
    <div class="tablewrap">
    <table>
      <thead><tr><th style="text-align:left;">Poradce</th>${cols}</tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="total"><td>Celkem tým (součet poradců)</td>${totalCells}</tr></tfoot>
    </table>
    </div>
  </div>
  <div class="card">
    <h2>Reálný týmový plán (od vedení)</h2>
    <p class="small" style="margin-bottom:10px;">Nepovinné. Skutečný cíl od vedení (obvykle nižší než součet poradců) — když ho vyplníš, Dashboard/Report ho použijí místo součtu.</p>
    <div class="tablewrap">
    <table>
      <thead><tr>${METRICS.map(m=>`<th>${m.name}<br><span class="small" style="color:#cdd;">${m.unit}</span></th>`).join('')}</tr></thead>
      <tbody><tr>${METRICS.map(m=>`<td><input type="number" min="0" value="${state.realTeamPlan[m.id]||''}" placeholder="${fmtNum(state.advisors.reduce((s,a)=>s+getPlan(a.id,m.id),0))}" onchange="setRealTeamPlan('${m.id}', this.value)"></td>`).join('')}</tr></tbody>
    </table>
    </div>
    <p class="small" style="margin-top:8px;">Placeholder v políčku ukazuje součet poradců pro srovnání — je to jen nápověda, ne uložená hodnota.</p>
  </div>`;
}
function setRealTeamPlan(mId, val){
  const amount = Math.max(0, Number(val)||0);
  const year = Number(state.year) || new Date().getFullYear();
  if(!amount){
    delete state.realTeamPlan[mId];
    if(sb && myUser) sb.from('real_team_plan').delete().eq('owner_id',myUser.id).eq('year',year).eq('metric_id',mId).then(({error})=>{ if(error) console.error(error); });
  }else{
    state.realTeamPlan[mId] = amount;
    if(sb && myUser) sb.from('real_team_plan').upsert({owner_id:myUser.id, year, metric_id:mId, amount}).then(({error})=>{ if(error){ console.error(error); toast('Uložení reálného plánu selhalo: '+error.message); } });
  }
  saveState();
}
function refreshTotals(){
  METRICS.forEach(m=>{
    const sum = state.advisors.reduce((s,a)=>s+getPlan(a.id,m.id),0);
    const el = document.getElementById('tot-'+m.id);
    if(el) el.textContent = fmt(m.id, sum);
  });
}
function emptyAdvisorsCard(){
  return `<div class="card"><p class="empty">Nejdřív přidej poradce v záložce „Poradci".</p></div>`;
}

/* ============== TAB: ROZLOŽENÍ % ============== */
function renderRozlozeni(){
  const arr = getDistGlobal();
  const cells = arr.map((v,i)=>`<td><input type="number" min="0" max="100" value="${v||''}" placeholder="0" onchange="setDistGlobalCell(${i}, this.value); refreshDistRowGlobal()"></td>`).join('');
  const sum = distSumGlobal();

  return `
  <div class="card">
    <h2>Rozložení ročního plánu na měsíce (%)</h2>
    <p class="small" style="margin-bottom:12px;">Jedna křivka pro celý tým, platí pro produkty v Kč. <b>Bankovní účty a X-SELL se vždy dělí rovnoměrně</b> (1/12), bez ohledu na tuto křivku.</p>
    <div class="row" style="margin-bottom:14px;">
      <button class="secondary" onclick="spreadEvenlyGlobal()">Rozložit rovnoměrně</button>
      <button class="secondary" onclick="clearDistGlobal()">Vynulovat</button>
    </div>
    <div class="tablewrap">
    <table>
      <thead><tr><th style="text-align:left;">Měsíční rozložení</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>Součet</th></tr></thead>
      <tbody><tr><td>% z ročního plánu</td>${cells}<td id="sumg" class="${Math.round(sum)===100?'sum-ok':'sum-bad'}">${Math.round(sum*10)/10}%</td></tr></tbody>
    </table>
    </div>
    <p class="small" style="margin-top:10px;">Součet by měl dát <b>100 %</b> — zeleně = OK, červeně = nesedí.</p>
  </div>`;
}
function refreshDistRowGlobal(){
  const sum = distSumGlobal();
  const el = document.getElementById('sumg');
  if(el){ el.textContent = (Math.round(sum*10)/10)+'%'; el.className = Math.round(sum)===100?'sum-ok':'sum-bad'; }
}
function spreadEvenlyGlobal(){
  const arr = getDistGlobal();
  for(let i=0;i<12;i++) arr[i] = Math.round((100/12)*100)/100;
  syncDistGlobal();
  saveState(); render();
}
function clearDistGlobal(){
  if(!confirm('Vynulovat měsíční rozložení procent?')) return;
  state.distGlobal = Array(12).fill(0);
  syncDistGlobal();
  saveState(); render();
}

/* ============== TAB: PŘEROZDĚLENÍ ============== */
function renderPrerozdeleni(){
  if(state.advisors.length===0) return emptyAdvisorsCard();
  const f = state._transferForm || {
    metricId: METRICS[0].id, sourceType:'advisor', sourceId: state.advisors[0].id,
    fromMonth:1, toMonth:12, targetFromMonth:1, targetToMonth:12, amount:0, method:'equal', targets:{}, note:'', markEnded:false
  };
  state._transferForm = f;
  if(f.targetFromMonth===undefined) f.targetFromMonth = f.fromMonth;
  if(f.targetToMonth===undefined) f.targetToMonth = f.toMonth;

  const metricOpts = METRICS.map(m=>`<option value="${m.id}" ${m.id===f.metricId?'selected':''}>${m.name}</option>`).join('');
  const advisorOpts = state.advisors.map(a=>`<option value="${a.id}" ${a.id===f.sourceId?'selected':''}>${escapeHtml(a.name)}</option>`).join('');
  const monthOpts = (sel)=>MONTHS.map((m,i)=>`<option value="${i+1}" ${i+1===sel?'selected':''}>${m}</option>`).join('');

  // auto-calc remaining if source = advisor
  let computedRemaining = 0;
  if(f.sourceType==='advisor'){
    for(let i=f.fromMonth-1;i<12;i++) computedRemaining += baseMonthly(f.sourceId, f.metricId, i);
    if(!f.amount) f.amount = Math.round(computedRemaining);
  }

  const targetCandidates = state.advisors.filter(a=> f.sourceType!=='advisor' || a.id!==f.sourceId);
  const targetChecks = targetCandidates.map(a=>{
    const checked = !!f.targets[a.id];
    const val = f.targets[a.id]?.amount || '';
    return `<div class="row" style="justify-content:space-between;">
      <label><input type="checkbox" ${checked?'checked':''} onchange="toggleTarget('${a.id}', this.checked)"> ${escapeHtml(a.name)}</label>
      ${f.method==='manual' && checked ? `<input type="number" min="0" style="width:110px;" value="${val}" placeholder="Kč/ks" onchange="setTargetAmount('${a.id}', this.value)">` : ''}
    </div>`;
  }).join('') || '<span class="small">Nejsou k dispozici žádní další poradci.</span>';

  const targetSum = Object.values(f.targets).reduce((s,t)=>s+(Number(t.amount)||0),0);
  const totalToSplit = Number(f.amount)||0;
  const checkedCount = Object.keys(f.targets).length;

  const logHtml = state.transferLog.length ? state.transferLog.slice().reverse().map(l=>{
    const targetsTxt = l.targets.map(t=>`${escapeHtml(t.name)}: +${fmtNum(t.perMonth)}/měs.`).join(', ');
    const tgtFrom = l.targetFromMonth || l.fromMonth, tgtTo = l.targetToMonth || l.toMonth;
    const sameRange = tgtFrom===l.fromMonth && tgtTo===l.toMonth;
    return `<div class="logitem">
      <div><b>${metric(l.metricId).name}</b> · zdroj ${MONTHS[l.fromMonth-1]}–${MONTHS[l.toMonth-1]}${sameRange?'':` · rozloženo ${MONTHS[tgtFrom-1]}–${MONTHS[tgtTo-1]}`} ${state.year}
      <button class="danger" style="float:right;padding:3px 10px;font-size:11px;" onclick="revertTransfer('${l.id}')">Vrátit zpět</button></div>
      <div class="small" style="margin-top:4px;">Zdroj: ${escapeHtml(l.fromLabel)}${l.fromPerMonth?` (−${fmtNum(l.fromPerMonth)}/měs.)`:''}</div>
      <div class="small">Komu: ${targetsTxt}</div>
      ${l.note?`<div class="small" style="margin-top:4px;">Poznámka: ${escapeHtml(l.note)}</div>`:''}
    </div>`;
  }).join('') : '<p class="empty">Zatím žádné přerozdělení.</p>';

  return `
  <div class="grid2">
    <div class="card">
      <h2>Nové přerozdělení plánu</h2>

      <div class="field">
        <label>Produkt</label>
        <select onchange="updateTransferForm('metricId', this.value)">${metricOpts}</select>
      </div>

      <div class="field">
        <label>Zdroj</label>
        <div class="row">
          <label><input type="radio" name="srcType" ${f.sourceType==='advisor'?'checked':''} onchange="updateTransferForm('sourceType','advisor')"> Od poradce (ukončil / bere se mu část)</label>
        </div>
        <div class="row">
          <label><input type="radio" name="srcType" ${f.sourceType==='manual'?'checked':''} onchange="updateTransferForm('sourceType','manual')"> Ruční částka (bez konkrétního zdroje)</label>
        </div>
      </div>

      ${f.sourceType==='advisor' ? `
      <div class="field">
        <label>Poradce (zdroj)</label>
        <select onchange="updateTransferForm('sourceId', this.value)">${advisorOpts}</select>
      </div>
      <div class="row">
        <div class="field" style="flex:1;">
          <label>Rozdělit od měsíce</label>
          <select onchange="updateTransferForm('fromMonth', Number(this.value))">${monthOpts(f.fromMonth)}</select>
        </div>
        <div class="field" style="flex:1;">
          <label>Do měsíce</label>
          <select onchange="updateTransferForm('toMonth', Number(this.value))">${monthOpts(f.toMonth)}</select>
        </div>
      </div>
      <div class="pill">Vypočtený zbývající plán zdroje: <b style="margin-left:6px;">${fmt(f.metricId, computedRemaining)}</b></div>
      <div class="field" style="margin-top:10px;">
        <label>Částka k rozdělení (lze upravit)</label>
        <input type="number" min="0" value="${f.amount || Math.round(computedRemaining)}" onchange="updateTransferForm('amount', this.value)">
      </div>
      <label class="row" style="margin-top:6px;"><input type="checkbox" ${f.markEnded?'checked':''} onchange="updateTransferForm('markEnded', this.checked)"> Zároveň označit poradce jako ukončeného od tohoto měsíce</label>

      <h3>Komu a kdy to přidat</h3>
      <div class="row">
        <div class="field" style="flex:1;">
          <label>Rozložit poradcům od měsíce</label>
          <select onchange="updateTransferForm('targetFromMonth', Number(this.value))">${monthOpts(f.targetFromMonth)}</select>
        </div>
        <div class="field" style="flex:1;">
          <label>Do měsíce</label>
          <select onchange="updateTransferForm('targetToMonth', Number(this.value))">${monthOpts(f.targetToMonth)}</select>
        </div>
      </div>
      <p class="small" style="margin-top:-6px;margin-bottom:10px;">Může se lišit od zdrojového období výš — např. plán zdroje počítáš od května, ale poradcům to rozložíš až od července do prosince.</p>
      ` : `
      <div class="row">
        <div class="field" style="flex:1;">
          <label>Od měsíce</label>
          <select onchange="updateTransferForm('fromMonth', Number(this.value))">${monthOpts(f.fromMonth)}</select>
        </div>
        <div class="field" style="flex:1;">
          <label>Do měsíce</label>
          <select onchange="updateTransferForm('toMonth', Number(this.value))">${monthOpts(f.toMonth)}</select>
        </div>
      </div>
      <div class="field">
        <label>Částka k rozdělení</label>
        <input type="number" min="0" value="${f.amount||''}" placeholder="0" onchange="updateTransferForm('amount', this.value)">
      </div>
      `}

      <h3>Komu rozdělit</h3>
      <div class="row" style="margin-bottom:8px;">
        <label><input type="radio" name="method" ${f.method==='equal'?'checked':''} onchange="updateTransferForm('method','equal')"> Rovnoměrně mezi vybrané</label>
        <label><input type="radio" name="method" ${f.method==='manual'?'checked':''} onchange="updateTransferForm('method','manual')"> Ručně zadám částku každému</label>
      </div>
      <div class="checklist">${targetChecks}</div>
      ${f.method==='manual' ? `<p class="small" style="margin-top:6px;">Součet zadaných částek: <b class="${Math.round(targetSum)===Math.round(totalToSplit)&&totalToSplit>0?'sum-ok':'sum-bad'}">${fmtNum(targetSum)}</b> / má být ${fmtNum(totalToSplit)}</p>` : `<p class="small" style="margin-top:6px;">Vybráno poradců: ${checkedCount}${checkedCount>0?` → každému ${fmtNum(totalToSplit/checkedCount)}`:''}</p>`}

      <div class="field" style="margin-top:10px;">
        <label>Poznámka (nepovinné)</label>
        <input type="text" value="${escapeHtml(f.note)}" placeholder="např. odchod k 30.6., přesun na zbytek týmu" onchange="updateTransferForm('note', this.value)">
      </div>

      <div class="actions-right">
        <button onclick="applyTransfer()">Provést přerozdělení</button>
      </div>
    </div>

    <div class="card">
      <h2>Historie přerozdělení</h2>
      ${logHtml}
    </div>
  </div>`;
}
function updateTransferForm(key, val){
  const f = state._transferForm;
  f[key] = val;
  if(key==='sourceType' || key==='sourceId' || key==='fromMonth'){ f.amount = 0; } // recompute suggestion
  if(key==='method' && val==='equal'){ /* keep targets checked state */ }
  render();
}
function toggleTarget(id, checked){
  const f = state._transferForm;
  if(checked) f.targets[id] = f.targets[id] || {amount:0};
  else delete f.targets[id];
  render();
}
function setTargetAmount(id, val){
  const f = state._transferForm;
  if(f.targets[id]) f.targets[id].amount = Number(val)||0;
}
async function applyTransfer(){
  const f = state._transferForm;
  const total = Number(f.amount)||0;
  const ids = Object.keys(f.targets);
  if(total<=0){ toast('Zadej částku k rozdělení větší než 0'); return; }
  if(ids.length===0){ toast('Vyber alespoň jednoho poradce, kterému se má plán přidat'); return; }

  const realCurrentMonth = state.currentMonth || (new Date()).getMonth()+1;
  if(f.fromMonth < realCurrentMonth){
    const useCurrent = confirm(`Zvolil jsi „od ${MONTHS[f.fromMonth-1]}", ale aktuální měsíc appky je ${MONTHS[realCurrentMonth-1]}.\n\nOK = přerozdělit až od ${MONTHS[realCurrentMonth-1]} (${MONTHS[f.fromMonth-1]}–${MONTHS[realCurrentMonth-2] || MONTHS[f.fromMonth-1]} zůstanou beze změny).\nZrušit = opravdu zahrnout i už proběhlé měsíce ${MONTHS[f.fromMonth-1]}–${MONTHS[realCurrentMonth-1]}.`);
    if(useCurrent){
      f.fromMonth = realCurrentMonth;
      if(f.toMonth < f.fromMonth) f.toMonth = f.fromMonth;
      if(f.targetFromMonth < f.fromMonth) f.targetFromMonth = f.fromMonth;
    }
  }

  // cílové období (komu a kdy se to přidá) — u zdroje "poradce" může být jiné než zdrojové období výš
  const targetFrom = f.sourceType==='advisor' ? f.targetFromMonth : f.fromMonth;
  const targetTo = f.sourceType==='advisor' ? f.targetToMonth : f.toMonth;
  const numMonths = (targetTo - targetFrom + 1);
  if(numMonths<1){ toast('Neplatný rozsah měsíců pro rozložení na poradce'); return; }
  const sourceNumMonths = (f.toMonth - f.fromMonth + 1);
  if(f.sourceType==='advisor' && sourceNumMonths<1){ toast('Neplatný rozsah zdrojového období'); return; }

  let perTargetTotal = {};
  if(f.method==='equal'){
    const share = total/ids.length;
    ids.forEach(id=>perTargetTotal[id]=share);
  }else{
    const sum = ids.reduce((s,id)=>s+(Number(f.targets[id].amount)||0),0);
    if(Math.round(sum)!==Math.round(total)){ toast('Součet ručně zadaných částek musí odpovídat celkové částce'); return; }
    ids.forEach(id=>perTargetTotal[id]=Number(f.targets[id].amount)||0);
  }

  const logTargets = [];
  ids.forEach(id=>{
    const perMonth = perTargetTotal[id]/numMonths;
    for(let m=targetFrom; m<=targetTo; m++) addAdjCell(id, f.metricId, m-1, perMonth);
    logTargets.push({id, name: advisor(id).name, perMonth});
  });

  let fromLabel = 'Ruční částka';
  let fromPerMonth = 0;
  if(f.sourceType==='advisor'){
    const src = advisor(f.sourceId);
    fromLabel = src.name;
    fromPerMonth = total/sourceNumMonths;
    for(let m=f.fromMonth; m<=f.toMonth; m++) addAdjCell(f.sourceId, f.metricId, m-1, -fromPerMonth);
    if(f.markEnded){
      src.endMonth = f.fromMonth-1 > 0 ? f.fromMonth-1 : f.fromMonth;
      dbUpdateAdvisor(src.id, {end_month: src.endMonth});
    }
  }

  const year = Number(state.year) || new Date().getFullYear();
  let logId = uid();
  if(sb){
    try{
      const { data, error } = await sb.from('transfer_log').insert({
        metric_id: f.metricId, from_advisor_id: f.sourceType==='advisor'?f.sourceId:null,
        from_label: fromLabel, from_per_month: fromPerMonth,
        from_month: f.fromMonth, to_month: f.toMonth,
        target_from_month: targetFrom, target_to_month: targetTo,
        targets: logTargets, note: f.note, year
      }).select().single();
      if(error) throw error;
      logId = data.id;
    }catch(e){ console.error(e); toast('Uložení přerozdělení do databáze selhalo: ' + e.message); }
    // ulož všechny dotčené měsíční úpravy
    ids.forEach(id=>{ for(let m=targetFrom; m<=targetTo; m++) syncAdjCell(id, f.metricId, m-1); });
    if(f.sourceType==='advisor'){ for(let m=f.fromMonth; m<=f.toMonth; m++) syncAdjCell(f.sourceId, f.metricId, m-1); }
  }

  state.transferLog.push({
    id: logId, date: new Date().toISOString(), metricId: f.metricId,
    fromLabel, fromId: f.sourceType==='advisor'?f.sourceId:null, fromPerMonth,
    fromMonth: f.fromMonth, toMonth: f.toMonth, targetFromMonth: targetFrom, targetToMonth: targetTo, targets: logTargets, note: f.note
  });

  state._transferForm = null;
  saveState(); toast('Přerozdělení provedeno'); render();
}
async function revertTransfer(logId){
  const l = state.transferLog.find(x=>x.id===logId);
  if(!l) return;
  if(!confirm('Vrátit toto přerozdělení zpět?')) return;
  const tgtFrom = l.targetFromMonth || l.fromMonth, tgtTo = l.targetToMonth || l.toMonth;
  if(l.fromId && l.fromPerMonth){
    for(let m=l.fromMonth; m<=l.toMonth; m++) addAdjCell(l.fromId, l.metricId, m-1, l.fromPerMonth);
  }
  l.targets.forEach(t=>{
    for(let m=tgtFrom; m<=tgtTo; m++) addAdjCell(t.id, l.metricId, m-1, -t.perMonth);
  });
  if(sb){
    if(l.fromId){ for(let m=l.fromMonth; m<=l.toMonth; m++) syncAdjCell(l.fromId, l.metricId, m-1); }
    l.targets.forEach(t=>{ for(let m=tgtFrom; m<=tgtTo; m++) syncAdjCell(t.id, l.metricId, m-1); });
    try{ const { error } = await sb.from('transfer_log').delete().eq('id', logId); if(error) throw error; }
    catch(e){ console.error(e); toast('Smazání v databázi selhalo: ' + e.message); }
  }
  state.transferLog = state.transferLog.filter(x=>x.id!==logId);
  saveState(); toast('Přerozdělení vráceno zpět'); render();
}

function renderPlneni(){
  if(state.advisors.length===0) return emptyAdvisorsCard();
  const mode = state._skutecnostMode || 'month';
  state._skutecnostMode = mode;
  const modeSwitch = `<div class="row" style="margin-bottom:12px;">
    <label class="small" style="font-weight:700;">Zadávat:</label>
    <button class="${mode==='month'?'':'secondary'}" onclick="state._skutecnostMode='month'; render()">Podle měsíce (všichni × všechny)</button>
    <button class="${mode==='product'?'':'secondary'}" onclick="state._skutecnostMode='product'; render()">Podle produktu (všichni poradci)</button>
    <button class="${mode==='advisor'?'':'secondary'}" onclick="state._skutecnostMode='advisor'; render()">Podle poradce (všechny produkty)</button>
  </div>`;
  let body;
  if(mode==='advisor') body = renderPlneniByAdvisor();
  else if(mode==='product') body = renderPlneniByProduct();
  else body = renderPlneniByMonth();
  return modeSwitch + body;
}

function renderPlneniByMonth(){
  const cm = state.currentMonth || (new Date()).getMonth()+1;
  const monthTabs = MONTHS.map((mo,i)=>`<button class="${i+1===cm?'':'secondary'}" style="padding:7px 10px;font-size:12.5px;" onclick="state.currentMonth=${i+1}; saveState(); render()">${mo}</button>`).join('');
  const orderedMetrics = [...METRICS.filter(m=>m.id!=='podnik'), ...METRICS.filter(m=>m.id==='podnik')];

  const rows = state.advisors.map(ad=>{
    const cells = orderedMetrics.map(m=>{
      const act = getActual(ad.id,m.id)[cm-1]||0;
      const plan = finalMonthly(ad.id,m.id,cm-1);
      const p = plneniPct(plan, act);
      const cls = plan>0 ? plneniBgClass(p) : '';
      const greyed = isEndedAt(ad,cm) || isBeforeStart(ad,cm);
      return `<td class="${cls}" style="padding:4px;">
        <input type="number" data-key="skm_${ad.id}_${m.id}" onkeydown="gridTabNav(event)" style="text-align:center;${greyed?'background:#f5f6f7;':''}" value="${act||''}" placeholder="0" onchange="setActualCell('${ad.id}','${m.id}',${cm-1}, this.value); render()">
        <div class="small" style="text-align:center;margin-top:2px;">plán ${fmtNum(plan)}</div>
      </td>`;
    }).join('');
    return `<tr><td style="text-align:left;">${escapeHtml(ad.name)} ${statusBadgeHtml(ad)}</td>${cells}</tr>`;
  }).join('');

  return `
  <div class="card">
    <h2>Zadání skutečnosti — ${MONTHS[cm-1]}</h2>
    <div class="row" style="margin-bottom:14px;flex-wrap:wrap;">${monthTabs}</div>
    <div class="tablewrap">
    <table class="gridtable">
      <thead><tr><th style="text-align:left;">Poradce</th>${orderedMetrics.map(m=>`<th>${m.name}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}

function renderPlneniByProduct(){
  const cm = state.currentMonth || (new Date()).getMonth()+1;
  const monthOpts = MONTHS.map((m,i)=>`<option value="${i+1}" ${i+1===cm?'selected':''}>${m}</option>`).join('');
  const qEnd = MONTH_QUARTER[cm-1]*3;
  const qNum = MONTH_QUARTER[cm-1];

  const selMetric = state._selMetricSkutecnost || METRICS[0].id;
  state._selMetricSkutecnost = selMetric;
  const metricOpts = METRICS.map(m=>`<option value="${m.id}" ${m.id===selMetric?'selected':''}>${m.name}</option>`).join('');
  const m = metric(selMetric);

  const rows = state.advisors.map(ad=>{
    let planCells='', actualCells='', planToDate=0, actualToDate=0, planYear=0, actualYear=0, planQtd=0, actualQtd=0;
    for(let i=0;i<12;i++){
      const p = finalMonthly(ad.id,selMetric,i);
      const act = getActual(ad.id,selMetric)[i]||0;
      planYear += p; actualYear += act;
      if(i+1<=cm){ planToDate+=p; actualToDate+=act; }
      if(i+1>=cm && i+1<=qEnd){ planQtd+=p; actualQtd+=act; }
      const greyed = isEndedAt(ad,i+1) || isBeforeStart(ad,i+1);
      const curCls = (i+1===cm) ? ' cur-month' : '';
      planCells += `<td class="small${curCls}" style="color:#8a97a3;">${fmtNum(p)}</td>`;
      actualCells += `<td class="${curCls.trim()}"><input type="number" data-key="skp_${ad.id}_${i}" onkeydown="gridTabNav(event)" style="${greyed?'background:#f5f6f7;':''}" value="${act||''}" placeholder="0" onchange="setActualCell('${ad.id}','${selMetric}',${i}, this.value); render()"></td>`;
    }
    const zbyvaMesic = finalMonthly(ad.id,selMetric,cm-1) - (getActual(ad.id,selMetric)[cm-1]||0);
    const zbyvaKvartal = planQtd - actualQtd;
    const zbyvaRok = planYear - actualYear;
    const zbyvaMesicuDoRoka = 12 - cm;
    const potrebaMesic = zbyvaMesicuDoRoka>0 ? zbyvaRok/zbyvaMesicuDoRoka : 0;
    const procento = planToDate>0 ? (actualToDate/planToDate*100) : (actualToDate>0?100:0);
    const rozdilKDatu = actualToDate - planToDate;
    return `
      <tr style="border-top:2px solid var(--border);"><td rowspan="2" style="vertical-align:middle;">${escapeHtml(ad.name)} ${statusBadgeHtml(ad)}</td>
        ${planCells}
        <td rowspan="2" style="vertical-align:middle;">${fmtNum(planYear)}</td>
        <td rowspan="2" style="vertical-align:middle;">${fmtNum(actualToDate)}</td>
        <td rowspan="2" style="vertical-align:middle;" class="${rozdilKDatu>=0?'sum-ok':'sum-bad'}">${rozdilKDatu>=0?'+':''}${fmtNum(rozdilKDatu)}<br><span class="small">(${Math.round(procento)}%)</span></td>
        <td rowspan="2" style="vertical-align:middle;" class="${zbyvaMesic<=0?'sum-ok':''}">${zbyvaMesic>=0?fmtNum(zbyvaMesic):('−'+fmtNum(Math.abs(zbyvaMesic)))}</td>
        <td rowspan="2" style="vertical-align:middle;" class="${zbyvaKvartal<=0?'sum-ok':''}">${zbyvaKvartal>=0?fmtNum(zbyvaKvartal):('−'+fmtNum(Math.abs(zbyvaKvartal)))}</td>
        <td rowspan="2" style="vertical-align:middle;"><b>${zbyvaRok>=0?fmtNum(zbyvaRok):('−'+fmtNum(Math.abs(zbyvaRok)))}</b></td>
        <td rowspan="2" style="vertical-align:middle;">${zbyvaMesicuDoRoka>0?fmtNum(potrebaMesic):'-'}</td>
      </tr>
      <tr>${actualCells}</tr>`;
  }).join('');

  return `
  <div class="card">
    <h2>Zadání skutečnosti — ${m.name} <span class="small">(${m.unit})</span></h2>
    <div class="row" style="margin-bottom:12px;">
      <label class="small" style="font-weight:700;">Produkt:</label>
      <select onchange="state._selMetricSkutecnost=this.value; render()">${metricOpts}</select>
      <label class="small" style="font-weight:700;margin-left:10px;">Aktuální měsíc:</label>
      <select onchange="state.currentMonth=Number(this.value); saveState(); render()">${monthOpts}</select>
      <span class="pill">Q${qNum} = ${MONTHS[qEnd-3]}–${MONTHS[qEnd-1]}</span>
    </div>
    <div class="tablewrap">
    <table class="gridtable">
      <thead><tr>
        <th style="text-align:left;">Poradce</th>${MONTHS.map((mo,i)=>`<th class="${i+1===cm?'cur-month':''}">${mo}</th>`).join('')}
        <th>Roční plán</th><th>Splněno k ${MONTHS[cm-1]}</th><th>Rozdíl k datu</th><th>Zbývá do konce měsíce</th><th>Zbývá do konce Q${qNum}</th><th>Zbývá do konce roku</th><th>Potřeba/měs.</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <p class="small" style="margin-top:10px;">Šedý řádek = plán, pod ním zadáváš skutečnost (u Podnik. rizik i záporně).</p>
  </div>`;
}

    }
    const zbyvaMesic = finalMonthly(ad.id,selMetric,cm-1) - (getActual(ad.id,selMetric)[cm-1]||0);
    const zbyvaKvartal = planQtd - actualQtd;
    const zbyvaRok = planYear - actualYear;
    const zbyvaMesicu = 12-cm;
    const potrebaMesic = zbyvaMesicu>0 ? zbyvaRok/zbyvaMesicu : 0;
    const proc = planToDate>0 ? Math.round(actualToDate/planToDate*100) : (actualToDate>0?100:0);
    const procMesicPct = plneniPct(finalMonthly(ad.id,selMetric,cm-1), getActual(ad.id,selMetric)[cm-1]||0);
    const procKvartalPct = plneniPct(planQtd, actualQtd);
    const procRokPct = plneniPct(planYear, actualYear);
    teamPlan+=planYear; teamActualToDate+=actualToDate; teamZbyvaRok+=zbyvaRok; teamPlanToDate+=planToDate; teamZbyvaMesic+=zbyvaMesic; teamZbyvaKvartal+=zbyvaKvartal;
    return `<tr><td>${escapeHtml(ad.name)} ${statusBadgeHtml(ad)}</td><td>${fmtNum(planYear)}</td><td>${fmtNum(actualToDate)}</td><td class="${plneniBgClass(proc)}" style="${plneniBgStyle(proc)}">${proc}%</td>
      <td class="${plneniBgClass(procMesicPct)}" style="${plneniBgStyle(procMesicPct)}">${zbyvaMesic>=0?fmtNum(zbyvaMesic):('−'+fmtNum(Math.abs(zbyvaMesic)))}</td>
      <td class="${plneniBgClass(procKvartalPct)}" style="${plneniBgStyle(procKvartalPct)}">${zbyvaKvartal>=0?fmtNum(zbyvaKvartal):('−'+fmtNum(Math.abs(zbyvaKvartal)))}</td>
      <td class="${plneniBgClass(procRokPct)}" style="${plneniBgStyle(procRokPct)}"><b>${zbyvaRok>=0?fmtNum(zbyvaRok):('−'+fmtNum(Math.abs(zbyvaRok)))}</b></td>
      <td>${zbyvaMesicu>0?fmtNum(potrebaMesic):'-'}</td></tr>`;
  }).join('');
  const teamProc = teamPlanToDate>0 ? Math.round(teamActualToDate/teamPlanToDate*100) : 0;

  // ---- Souhrnná tabulka pro e-mail: PLÁN / SKUTEČNOST / ZBÝVÁ / PLNĚNÍ % pro všechny produkty a poradce, podle zvoleného období ----
  const slice = state._selSlice || 'ytd_month';
  state._selSlice = slice;
  const qStart = qEnd-2, qN = qNum;
  const sliceLabels = {
    ytd_month:   `od ledna do konce ${MONTHS[cm-1]}`,
    month:       `${MONTHS[cm-1]}`,
    ytd_quarter: `od ledna do konce Q${qN} (${MONTHS[qStart-1]}–${MONTHS[qEnd-1]})`,
    quarter:     `Q${qN} (${MONTHS[qStart-1]}–${MONTHS[qEnd-1]})`,
  };
  const sliceOpts = Object.entries({ytd_month:'Od začátku roku do konce měsíce', month:'Jen tento měsíc', ytd_quarter:'Od začátku roku do konce kvartálu', quarter:'Jen tento kvartál'})
    .map(([k,label])=>`<option value="${k}" ${k===slice?'selected':''}>${label}</option>`).join('');

  const KC_METRICS = METRICS.filter(m=>['zivot','domov','auto'].includes(m.id));
  const KS_METRICS = METRICS.filter(m=>['ucty','xsell'].includes(m.id));
  const subHeadersFor = (list)=>list.map(m=>`<th style="text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.name}</th>`).join('');

  function blockTable(id, title, color, metricList, cellFn){
    const rows = teamAdvisorsActive.map(ad=>{
      const vals = metricList.map(m=>sliceValues(ad.id,m.id,slice,cm));
      const cells = vals.map((v,idx)=>cellFn(v, metricList[idx].id)).join('');
      return `<tr><td style="text-align:left;white-space:nowrap;font-size:12px;padding-left:10px;padding-right:14px;">${escapeHtml(advisorLabel(ad))}</td>${cells}</tr>`;
    }).join('');
    return `<div class="tablewrap" style="margin-bottom:32px;">
      <table id="${id}" style="table-layout:auto;width:auto;">
        <thead>
          <tr><th colspan="${metricList.length+1}" style="text-align:center;background:${color};">${title} — ${sliceLabels[slice]}</th></tr>
          <tr><th style="text-align:left;white-space:nowrap;font-size:12px;padding-left:10px;padding-right:14px;">Poradce</th>${subHeadersFor(metricList)}</tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  const planTable = blockTable('emailPlanTable', 'PLÁN', 'var(--dark)', KC_METRICS, (v,mId)=>`<td class="blk-plan" style="text-align:center;width:100px;overflow:hidden;font-size:12px;">${fmt(mId,v.plan)}</td>`);
  const actualTable = blockTable('emailActualTable', 'SKUTEČNOST', 'var(--dark)', KC_METRICS, (v,mId)=>{
    const p = plneniPct(v.plan, v.actual);
    return `<td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${fmt(mId,v.actual)}</td>`;
  });
  const zbyvaTable = blockTable('emailZbyvaTable', 'ZBÝVÁ DODAT', 'var(--dark)', KC_METRICS, (v,mId)=>{
    const z = v.plan-v.actual;
    const p = plneniPct(v.plan, v.actual);
    return `<td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${z>=0?fmt(mId,z):('−'+fmt(mId,Math.abs(z)))}</td>`;
  });
  const plneniTable = blockTable('emailPlneniTable', 'PLNĚNÍ V %', 'var(--dark)', KC_METRICS, (v,mId)=>{
    const p = plneniPct(v.plan, v.actual);
    return `<td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${p}%</td>`;
  });

  // Bankovní účty + X-SELL — počty kusů, jiná logika než Kč produkty, proto zvlášť
  const ksPlanTable = blockTable('emailKsPlanTable', 'PLÁN (ks)', 'var(--dark)', KS_METRICS, (v,mId)=>`<td class="blk-plan" style="text-align:center;width:100px;overflow:hidden;font-size:12px;">${fmt(mId,v.plan)}</td>`);
  const ksActualTable = blockTable('emailKsActualTable', 'SKUTEČNOST (ks)', 'var(--dark)', KS_METRICS, (v,mId)=>{
    const p = plneniPct(v.plan, v.actual);
    return `<td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${fmt(mId,v.actual)}</td>`;
  });
  const ksZbyvaTable = blockTable('emailKsZbyvaTable', 'ZBÝVÁ DODAT (ks)', 'var(--dark)', KS_METRICS, (v,mId)=>{
    const z = v.plan-v.actual;
    const p = plneniPct(v.plan, v.actual);
    return `<td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${z>=0?fmt(mId,z):('−'+fmt(mId,Math.abs(z)))}</td>`;
  });
  const ksPlneniTable = blockTable('emailKsPlneniTable', 'PLNĚNÍ V % (ks)', 'var(--dark)', KS_METRICS, (v,mId)=>{
    const p = plneniPct(v.plan, v.actual);
    return `<td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${p}%</td>`;
  });
  const ksTablesHtml = `
  <details class="card">
    <summary style="cursor:pointer;font-weight:700;color:var(--dark);">Bankovní účty a X-SELL — samostatně (klikni pro rozbalení)</summary>
    <p class="small" style="margin:10px 0;">Počty kusů, rozdělené rovnoměrně po měsících (ne podle % křivky). Období: ${sliceLabels[slice]}.</p>
    <div class="row" style="margin-bottom:12px;">
      <button class="secondary" onclick="copyAllTables(['emailKsPlneniTable','emailKsActualTable','emailKsZbyvaTable','emailKsPlanTable'])">📋 Kopírovat všechny 4</button>
    </div>
    ${ksPlneniTable}${ksActualTable}${ksZbyvaTable}${ksPlanTable}
    <div class="row">
      <button class="secondary" onclick="copyTable('emailKsPlneniTable')">📋 Jen Plnění %</button>
      <button class="secondary" onclick="copyTable('emailKsActualTable')">📋 Jen Skutečnost</button>
      <button class="secondary" onclick="copyTable('emailKsZbyvaTable')">📋 Jen Zbývá dodat</button>
      <button class="secondary" onclick="copyTable('emailKsPlanTable')">📋 Jen Plán</button>
    </div>
  </details>`;

  // Pojištění podnikatelských rizik — samostatná tabulka, mimo hlavní přehled
  const podnikRows = teamAdvisorsActive.map(ad=>{
    const v = sliceValues(ad.id,'podnik',slice,cm);
    const z = v.plan-v.actual;
    const p = plneniPct(v.plan, v.actual);
    return `<tr><td style="text-align:left;white-space:nowrap;font-size:12px;padding-left:10px;padding-right:14px;">${escapeHtml(advisorLabel(ad))}</td><td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${p}%</td><td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${fmt('podnik',v.actual)}</td><td class="${plneniBgClass(p)}" style="${plneniBgStyle(p)}text-align:center;width:100px;overflow:hidden;font-size:12px;">${z>=0?fmt('podnik',z):('−'+fmt('podnik',Math.abs(z)))}</td><td class="blk-plan" style="text-align:center;width:100px;overflow:hidden;font-size:12px;">${fmt('podnik',v.plan)}</td></tr>`;
  }).join('');
  const podnikTableHtml = `
  <details class="card">
    <summary style="cursor:pointer;font-weight:700;color:var(--dark);">Pojištění podnikatelských rizik — samostatně (klikni pro rozbalení)</summary>
    <p class="small" style="margin:10px 0;">Tenhle produkt je nárůst kmene (může být i v mínusu), proto je mimo hlavní souhrnnou tabulku. Období: ${sliceLabels[slice]}.</p>
    <div class="tablewrap">
    <table id="emailPodnikTable" style="table-layout:auto;width:auto;">
      <thead><tr><th style="text-align:left;white-space:nowrap;font-size:12px;padding-left:10px;padding-right:14px;">Poradce</th><th style="text-align:center;width:100px;font-size:12px;">Plnění %</th><th style="text-align:center;width:100px;font-size:12px;">Skutečnost</th><th style="text-align:center;width:100px;font-size:12px;">Zbývá dodat</th><th style="text-align:center;width:100px;font-size:12px;">Plán</th></tr></thead>
      <tbody>${podnikRows}</tbody>
    </table>
    </div>
    <div class="actions-right"><button class="secondary" onclick="copyTable('emailPodnikTable')">📋 Kopírovat</button></div>
  </details>`;

  const emailTableHtml = `
  <div class="card" style="zoom:1.25;">
    <h2 style="font-size:18px;">📧 Hlavní report — souhrn pro e-mail</h2>
    <div class="row" style="margin-bottom:12px;">
      <label class="small" style="font-weight:700;">Období:</label>
      <select onchange="state._selSlice=this.value; render()">${sliceOpts}</select>
      <button class="secondary" onclick="copyAllTables(['emailPlneniTable','emailActualTable','emailZbyvaTable','emailPlanTable'])">📋 Kopírovat všechny 4 tabulky</button>
    </div>
    ${plneniTable}
    ${actualTable}
    ${zbyvaTable}
    ${planTable}
    <div class="row">
      <button class="secondary" onclick="copyTable('emailPlneniTable')">📋 Jen Plnění %</button>
      <button class="secondary" onclick="copyTable('emailActualTable')">📋 Jen Skutečnost</button>
      <button class="secondary" onclick="copyTable('emailZbyvaTable')">📋 Jen Zbývá dodat</button>
      <button class="secondary" onclick="copyTable('emailPlanTable')">📋 Jen Plán</button>
    </div>
  </div>
  ${ksTablesHtml}
  ${podnikTableHtml}`;

  // ---- Predikce (kopírovatelný text) ----
  const weekNum = isoWeekNumber(new Date());
  const novacekCount = teamAdvisorsActive.filter(a=>isNovacek(a)).length;
  const coreCount = teamAdvisorsActive.length - novacekCount;
  const quarterEndDate = new Date(Number(state.year)||new Date().getFullYear(), qEnd, 0);
  const weeksLeftInQuarter = Math.max(1, Math.ceil((quarterEndDate - new Date())/(7*86400000)));
  const zbQ = mId => {
    let plan=0, actual=0;
    teamAdvisorsActive.forEach(ad=>{ const v=sliceValues(ad.id,mId,'ytd_quarter',cm); plan+=v.plan; actual+=v.actual; });
    const remaining = plan-actual;
    return Math.round(remaining/weeksLeftInQuarter);
  };
  const predText = [
    `Predikce OS ${state.teamName} ${weekNum}. týden`,
    `Poradci:\t${coreCount}+${novacekCount}`,
    `Naše auto:\t${fmtNum(zbQ('auto'))} Kč`,
    `Náš domov:\t${fmtNum(zbQ('domov'))} Kč`,
    `Náš život:\t${fmtNum(zbQ('zivot'))} Kč`,
    `X-SELL:\t${fmtNum(zbQ('xsell'))} ks`,
    `Konta:\t${fmtNum(zbQ('ucty'))} ks`,
    `Pohovory:\t${state.weeklyManual.pohovory||0}`,
    `Kontakty k oslovení:\t${state.weeklyManual.kontakty||0}`,
  ].join('\n');

  const predikceHtml = `
  <div class="card">
    <h2>Predikce (kopírovatelný text)</h2>
    <div class="row" style="margin-bottom:10px;">
      <div class="field" style="margin:0;"><label>Název týmu/oblasti</label><input type="text" style="width:180px;" value="${escapeHtml(state.teamName)}" onchange="state.teamName=this.value; saveState(); render()"></div>
      <div class="field" style="margin:0;"><label>Pohovory</label><input type="number" min="0" style="width:80px;" value="${state.weeklyManual.pohovory||0}" onchange="state.weeklyManual.pohovory=Number(this.value)||0; saveState(); render()"></div>
      <div class="field" style="margin:0;"><label>Kontakty k oslovení</label><input type="number" min="0" style="width:80px;" value="${state.weeklyManual.kontakty||0}" onchange="state.weeklyManual.kontakty=Number(this.value)||0; saveState(); render()"></div>
    </div>
    <textarea id="predikceText" class="predtext" style="width:100%;min-height:210px;border:1px solid var(--border);border-radius:6px;" readonly>${predText}</textarea>
    <div class="actions-right">
      <button onclick="copyPlainText('predikceText')">📋 Kopírovat text</button>
    </div>
    <p class="small" style="margin-top:10px;">Zbývá dodat do konce kvartálu, rozpočítáno na ${weeksLeftInQuarter} zbývajících týdnů. Ukončení poradci se nepočítají.</p>
  </div>`;

  return `
  ${emailTableHtml}
  <div class="card">
    <h2>Žebříček podle jednoho produktu</h2>
    <div class="row" style="margin-bottom:12px;">
      <label class="small" style="font-weight:700;">Produkt:</label>
      <select onchange="state._selMetricPlneni=this.value; render()">${metricOpts}</select>
      <label class="small" style="font-weight:700;margin-left:10px;">Zobrazit:</label>
      <select onchange="state._teamFilter=this.value; render()">${teamFilterOptionsHtml()}</select>
      <label class="small" style="font-weight:700;margin-left:10px;">Měsíc:</label>
      <select onchange="state._reportMonth=Number(this.value); render()">${MONTHS.map((m,i)=>`<option value="${i+1}" ${i+1===cm?'selected':''}>${m}</option>`).join('')}</select>
      <span class="pill">Q${qNum}</span>
      <button class="secondary" onclick="copyTable('plneniTeamTable')">📋 Kopírovat</button>
      <button class="secondary" onclick="exportXlsx('plneniTeamTable','Report')">⬇ Excel</button>
    </div>
    <div class="tablewrap">
    <table id="plneniTeamTable">
      <thead><tr><th style="text-align:left;">Poradce</th><th>Roční plán</th><th>Splněno k ${MONTHS[cm-1]}</th><th>% plnění k datu</th><th>Zbývá do konce měsíce</th><th>Zbývá do konce Q${qNum}</th><th>Zbývá do konce roku</th><th>Potřeba/měs.</th></tr></thead>
      <tbody>${teamRows}</tbody>
      <tfoot><tr class="total"><td>Celkem tým</td><td>${fmtNum(teamPlan)}</td><td>${fmtNum(teamActualToDate)}</td><td>${teamProc}%</td>
        <td>${fmtNum(teamZbyvaMesic)}</td><td>${fmtNum(teamZbyvaKvartal)}</td><td>${fmtNum(teamZbyvaRok)}</td><td>${cm<12?fmtNum(teamZbyvaRok/(12-cm)):'-'}</td></tr></tfoot>
    </table>
    </div>
    <p class="small" style="margin-top:10px;">Zahrnuje i ukončené poradce (odznak „ukončen"), ať vidíš jejich plnění za dobu, co v týmu byli.</p>
  </div>
  ${predikceHtml}`;
}

/* ============== TAB: DASHBOARD ============== */
function renderDashboard(){
  if(state.advisors.length===0) return emptyAdvisorsCard();
  const teamAdvisors = filteredAdvisors(state._teamFilter);
  const allowReal = !state._teamFilter || state._teamFilter==='all';
  const cm = state.currentMonth || (new Date()).getMonth()+1;
  const monthOpts = MONTHS.map((m,i)=>`<option value="${i+1}" ${i+1===cm?'selected':''}>${m}</option>`).join('');

  // KPI karty za celý tým, jeden produkt = jedna karta
  const cards = METRICS.map(m=>{
    let planYear=0, actualToDate=0, planToDate=0;
    const planThisMonth = teamPlanMonthly(m.id,cm-1,teamAdvisors,allowReal);
    for(let i=0;i<12;i++){
      const p = teamPlanMonthly(m.id,i,teamAdvisors,allowReal);
      planYear+=p;
      if(i+1<=cm){
        planToDate+=p;
        teamAdvisors.forEach(ad=>{ actualToDate += (getActual(ad.id,m.id)[i]||0); });
      }
    }
    const proc = planToDate>0 ? Math.round(actualToDate/planToDate*100) : (actualToDate>0?100:0);
    const cls = plneniClass(proc);
    const realNote = (allowReal && state.realTeamPlan[m.id]) ? ' 📌' : '';
    return `<div class="card" style="flex:1;min-width:170px;margin-bottom:0;">
      <div class="small" style="font-weight:700;color:var(--dark);">${m.name}</div>
      <div style="font-size:22px;font-weight:800;margin:4px 0;" class="${cls}">${proc}%</div>
      <div class="small" style="white-space:nowrap;">plán ${MONTHS[cm-1]}: ${fmt(m.id,planThisMonth)}${realNote}</div>
    </div>`;
  }).join('');

  // Matice poradci x produkty — % plnění k datu, barevně
  const rows = teamAdvisors.map(ad=>{
    const cells = METRICS.map(m=>{
      let planToDate=0, actualToDate=0, planYear=0, actualYear=0;
      for(let i=0;i<12;i++){
        const p = finalMonthly(ad.id,m.id,i);
        const act = getActual(ad.id,m.id)[i]||0;
        planYear+=p; actualYear+=act;
        if(i+1<=cm){ planToDate+=p; actualToDate+=act; }
      }
      const proc = planToDate>0 ? Math.round(actualToDate/planToDate*100) : (actualToDate>0?100:0);
      const cls = plneniClass(proc);
      const zbyva = planYear-actualYear;
      return `<td>
        <div class="${cls}" style="font-size:15px;">${proc}%</div>
        <div class="small">zbývá ${zbyva>=0?fmtNum(zbyva):('−'+fmtNum(Math.abs(zbyva)))}</div>
      </td>`;
    }).join('');
    const ended = ad.endMonth && cm>ad.endMonth;
    return `<tr>
      <td>${escapeHtml(ad.name)} ${statusBadgeHtml(ad)}
        <div><button class="secondary" style="padding:3px 8px;font-size:11px;margin-top:4px;" onclick="state._selAdvisorDetail='${ad.id}'; switchTab('detail')">Detail →</button></div>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  // Zbývá dodat za celou skupinu — do konce měsíce / kvartálu / roku, po produktech
  const qEndD = MONTH_QUARTER[cm-1]*3;
  const zbyvaGroupRows = METRICS.map(m=>{
    let planMesic=0, actualMesic=0, planKvartal=0, actualKvartal=0, planRok=0, actualRok=0;
    planMesic = teamPlanMonthly(m.id,cm-1,teamAdvisors,allowReal);
    for(let i=cm-1;i<qEndD;i++) planKvartal += teamPlanMonthly(m.id,i,teamAdvisors,allowReal);
    for(let i=0;i<12;i++) planRok += teamPlanMonthly(m.id,i,teamAdvisors,allowReal);
    teamAdvisors.forEach(ad=>{
      actualMesic += (getActual(ad.id,m.id)[cm-1]||0);
      for(let i=cm-1;i<qEndD;i++) actualKvartal += (getActual(ad.id,m.id)[i]||0);
      for(let i=0;i<12;i++) actualRok += (getActual(ad.id,m.id)[i]||0);
    });
    const zbyvaMesic = planMesic-actualMesic, zbyvaKvartal = planKvartal-actualKvartal, zbyvaRok = planRok-actualRok;
    const fz = z => z>=0 ? fmt(m.id,z) : ('−'+fmt(m.id,Math.abs(z)));
    const clsMesic = plneniBgClass(plneniPct(planMesic, actualMesic));
    const clsKvartal = plneniBgClass(plneniPct(planKvartal, actualKvartal));
    const clsRok = plneniBgClass(plneniPct(planRok, actualRok));
    return `<tr><td style="text-align:left;">${m.name}</td><td class="${clsMesic}">${fz(zbyvaMesic)}</td><td class="${clsKvartal}">${fz(zbyvaKvartal)}</td><td class="${clsRok}"><b>${fz(zbyvaRok)}</b></td></tr>`;
  }).join('');
  const zbyvaGroupHtml = `
  <div class="card">
    <h2>Zbývá dodat za celou skupinu</h2>
    <div class="tablewrap">
    <table>
      <thead><tr><th style="text-align:left;">Produkt</th><th>Do konce měsíce (${MONTHS[cm-1]})</th><th>Do konce kvartálu</th><th>Do konce roku</th></tr></thead>
      <tbody>${zbyvaGroupRows}</tbody>
    </table>
    </div>
  </div>`;

  return `
  <div class="row" style="margin-bottom:16px;">
    <label class="small" style="font-weight:700;">Aktuální měsíc:</label>
    <select onchange="state.currentMonth=Number(this.value); saveState(); render()">${monthOpts}</select>
    <label class="small" style="font-weight:700;margin-left:10px;">Zobrazit:</label>
    <select onchange="state._teamFilter=this.value; render()">${teamFilterOptionsHtml()}</select>
  </div>
  ${teamAdvisors.length===0 ? '<p class="empty">V tomhle výběru nejsou žádní poradci.</p>' : `
  <div class="row" style="margin-bottom:18px;align-items:stretch;">${cards}</div>
  ${zbyvaGroupHtml}
  <div class="card">
    <h2>Všichni poradci × všechny produkty — od ledna do konce ${MONTHS[cm-1]}</h2>
    <div class="tablewrap">

        <h3>Denní návyky</h3>

  </div>`;

  const habitsHtml = habitList.map(h=>{

  }).join('');
  const weeklyHtml = weeklyList.map(h=>{
    const checked = !!day.weekly[h.id];
    return `<label style="display:flex;gap:8px;align-items:center;padding:4px 0;"><input type="checkbox" ${checked?'checked':''} onchange="toggleHabit('${dateStr}','${h.id}',true); render()"> ${escapeHtml(h.label)}</label>`;
  }).join('');
  const advisorOpts = ['<option value="">— nevybráno —</option>'].concat(state.advisors.map(a=>`<option value="${a.id}" ${day.personOfDay===a.id?'selected':''}>${escapeHtml(a.name)}</option>`)).join('');

  const managerCard = `
  <div class="card">
    <h2>Moje atomové návyky</h2>
    <div class="grid2">
      <div>
        <h3>Denně</h3>
        ${habitsHtml || '<p class="empty">Žádné body — přidej je přes „Upravit body checklistu".</p>'}
      </div>
      <div>
        <h3>Týdně</h3>
        ${weeklyHtml || '<p class="empty">Žádné body.</p>'}
        <h3 style="margin-top:16px;">Člověk dne</h3>
        <div class="field">
          <label>Komu dnes věnuji cílenou pozornost (podle toho, kdo je pod plánem)</label>
          <select onchange="setPersonOfDay('${dateStr}', this.value)">${advisorOpts}</select>

  if(state.advisors.length===0) return nav + editorHtml + managerCard + emptyAdvisorsCard();

  const visibleAdvisors = state.advisors.filter(a=>!a.hiddenDaily);

  const totalKonvVse = safePct(sumObchody, sumLeady);      // konverze na všechny úkoly (leady)

      <td>${e.obchody}</td><td class="${konverzeBgClass(konvPct)}" style="${konverzeBgStyle(konvPct)}">${konvPct}%</td>

      <label class="small" style="font-weight:700;">Kampaň/leady:</label>

    <div class="tablewrap">
    <table>
